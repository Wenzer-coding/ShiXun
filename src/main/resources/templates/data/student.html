<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生管理 - 高校实训管理平台</title>
    <!-- Bootstrap 5.3.0 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome 6.4.0 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Icons', 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
        }

        .content-card {
            background: #ffffff;
            border-radius: 0;
            padding: 32px;
            box-shadow: none;
            min-height: 100vh;
        }

        .card-header {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e5e5e7;
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: #1d1d1f;
            margin: 0 0 4px 0;
        }

        .card-subtitle {
            font-size: 14px;
            color: #86868b;
            margin: 0;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            flex-wrap: wrap;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-input, .search-select {
            border: 1px solid #d1d1d6;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .search-input {
            min-width: 150px;
        }

        .search-select {
            min-width: 150px;
            cursor: pointer;
        }

        .search-input:focus, .search-select:focus {
            outline: none;
            border-color: #007AFF;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        .btn-icon {
            border: 1px solid #d1d1d6;
            background: #ffffff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
            color: #007AFF;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-icon:hover {
            background-color: #f5f5f7;
            border-color: #007AFF;
        }

        .btn-icon-danger {
            color: #FF3B30;
        }

        .btn-icon-danger:hover {
            background-color: #ffe5e5;
        }

        .table-responsive {
            overflow-x: auto;
        }

        .table th {
            font-weight: 600;
            color: #1d1d1f;
            font-size: 14px;
            border-bottom: 2px solid #e5e5e7;
            padding: 12px 16px;
        }

        .table td {
            padding: 12px 16px;
            font-size: 14px;
            color: #1d1d1f;
            vertical-align: middle;
        }

        .checkbox-cell {
            width: 50px;
        }

        .form-check-input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-enabled {
            background-color: #e6f7ed;
            color: #00A862;
        }

        .status-disabled {
            background-color: #ffe5e5;
            color: #FF3B30;
        }

        .btn-action {
            border: none;
            background: none;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-size: 13px;
            margin-right: 4px;
        }

        .btn-edit {
            color: #007AFF;
        }

        .btn-edit:hover {
            background-color: #e8f0ff;
        }

        .btn-delete {
            color: #FF3B30;
        }

        .btn-delete:hover {
            background-color: #ffe5e5;
        }

        .pagination {
            justify-content: flex-end;
            margin-top: 20px;
        }

        .page-link {
            border: none;
            color: #007AFF;
            padding: 8px 12px;
            margin: 0 2px;
            border-radius: 6px;
            font-size: 14px;
        }

        .page-link:hover {
            background-color: #f5f5f7;
        }

        .page-item.active .page-link {
            background-color: #007AFF;
            border-color: #007AFF;
        }

        .modal-header {
            border-bottom: 1px solid #e5e5e7;
            padding: 20px 24px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #1d1d1f;
        }

        .modal-body {
            padding: 24px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 8px;
        }

        .form-control, .form-select {
            border: 1px solid #d1d1d6;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: #007AFF;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        .btn-primary {
            background-color: #007AFF;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background-color: #0056CC;
        }

        .btn-secondary {
            background-color: #f5f5f7;
            border: 1px solid #d1d1d6;
            color: #1d1d1f;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-secondary:hover {
            background-color: #e5e5e7;
        }
    </style>
</head>
<body>
    <div class="content-card">
        <!-- 页面标题 -->
        <div class="card-header">
            <h3 class="card-title">
                <i class="fas fa-user-graduate" style="color: #007AFF; margin-right: 10px;"></i>
                学生管理
            </h3>
            <p class="card-subtitle">管理学生基本信息和学籍状态</p>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar">
            <div class="toolbar-left">
                <input type="text" class="search-input" id="searchStudentNo" placeholder="请输入学号">
                <input type="text" class="search-input" id="searchStudentName" placeholder="请输入姓名">
                <select class="search-select" id="searchClassId">
                    <option value="">选择班级</option>
                </select>
                <select class="search-select" id="searchStatus">
                    <option value="">状态</option>
                    <option value="1">正常</option>
                    <option value="0">禁用</option>
                </select>
                <button class="btn-icon" onclick="searchData()">
                    <i class="fas fa-search"></i> 搜索
                </button>
            </div>
            <div class="toolbar-right">
                <button class="btn-icon btn-icon-primary" onclick="showAddModal()"><i class="fas fa-plus"></i> 新增学生</button>
                <button class="btn-icon btn-icon-danger" id="batchDeleteBtn" onclick="batchDelete()" style="display:none;"><i class="fas fa-trash"></i> 批量删除</button>
            </div>
        </div>

        <!-- 表格 -->
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th class="checkbox-cell">
                            <input type="checkbox" class="form-check-input" id="selectAll" onchange="toggleSelectAll()">
                        </th>
                        <th>学号</th>
                        <th>姓名</th>
                        <th>性别</th>
                        <th>手机号</th>
                        <th>邮箱</th>
                        <th>班级</th>
                        <th>入学年份</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- 动态生成 -->
                </tbody>
            </table>
        </div>

        <!-- 分页 -->
        <nav>
            <ul class="pagination" id="pagination">
                <!-- 动态生成 -->
            </ul>
        </nav>
    </div>

    <!-- 新增/编辑模态窗 -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增学生</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="studentForm">
                        <input type="hidden" id="studentId">
                        
                        <!-- 第1行：学号 + 姓名 -->
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="mb-3">
                                <label class="form-label">学号 <span style="color: #FF3B30;">*</span></label>
                                <input type="text" class="form-control" id="studentNo" required placeholder="请输入学号">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">姓名 <span style="color: #FF3B30;">*</span></label>
                                <input type="text" class="form-control" id="studentName" required placeholder="请输入姓名">
                            </div>
                        </div>
                        
                        <!-- 第2行：性别 + 手机号 -->
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="mb-3">
                                <label class="form-label">性别 <span style="color: #FF3B30;">*</span></label>
                                <select class="form-select" id="gender" required>
                                    <option value="">请选择</option>
                                    <option value="1">男</option>
                                    <option value="0">女</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">手机号</label>
                                <input type="text" class="form-control" id="phone" placeholder="请输入手机号">
                            </div>
                        </div>
                        
                        <!-- 第3行：邮箱 + 班级 -->
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="mb-3">
                                <label class="form-label">邮箱</label>
                                <input type="email" class="form-control" id="email" placeholder="请输入邮箱">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">班级</label>
                                <select class="form-select" id="classId">
                                    <option value="">请选择班级</option>
                                </select>
                            </div>
                        </div>
                        
                        <!-- 第4行：入学年份 + 状态 -->
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="mb-3">
                                <label class="form-label">入学年份</label>
                                <input type="number" class="form-control" id="enrollYear" placeholder="例如: 2024" min="2000" max="2099">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">状态</label>
                                <select class="form-select" id="status">
                                    <option value="1">正常</option>
                                    <option value="0">禁用</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn-primary" onclick="submitForm()">确定</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    
    <script>
        let currentPage = 1;
        let pageSize = 10;
        let selectedIds = [];
        let classList = [];

        // 页面加载
        $(function() {
            loadData();
            loadClassList();
        });


        // 加载数据
        function loadData() {
            const params = {
                pageNum: currentPage,
                pageSize: pageSize,
                studentNo: $('#searchStudentNo').val(),
                studentName: $('#searchStudentName').val(),
                classId: $('#searchClassId').val(),
                status: $('#searchStatus').val()
            };

            $.get('/api/student/page', params, function(res) {
                if (res.code === 200) {
                    renderTable(res.data.list);
                    renderPagination(res.data);
                } else {
                    alert('查询失败: ' + res.message);
                }
            });
        }

        // 渲染表格
        function renderTable(data) {
            let html = '';
            if (data.length === 0) {
                html = '<tr><td colspan="11" class="text-center text-muted">暂无数据</td></tr>';
            } else {
                data.forEach(item => {
                    html += `
                        <tr>
                            <td class="checkbox-cell">
                                <input type="checkbox" class="form-check-input" value="${item.id}" onchange="updateSelected()">
                            </td>
                            <td>${item.studentNo || '-'}</td>
                            <td>${item.studentName || '-'}</td>
                            <td>${item.gender === 1 ? '男' : item.gender === 0 ? '女' : '-'}</td>
                            <td>${item.phone || '-'}</td>
                            <td>${item.email || '-'}</td>
                            <td>${item.className || '-'}</td>
                            <td>${item.enrollYear || '-'}</td>
                            <td>
                                <span class="status-badge ${item.status === 1 ? 'status-enabled' : 'status-disabled'}">
                                    ${item.status === 1 ? '正常' : '禁用'}
                                </span>
                            </td>
                            <td>${formatDate(item.createTime)}</td>
                            <td>
                                <button class="btn-action btn-edit" onclick="showEditModal(${item.id})"><i class="fas fa-edit"></i> 编辑</button>
                                <button class="btn-action btn-delete" onclick="deleteItem(${item.id})"><i class="fas fa-trash"></i> 删除</button>
                            </td>
                        </tr>
                    `;
                });
            }
            $('#tableBody').html(html);
        }

        // 渲染分页
        function renderPagination(data) {
            let html = '';
            const totalPages = Math.ceil(data.total / data.pageSize);
            
            // 上一页
            html += `
                <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="changePage(${currentPage - 1})">上一页</a>
                </li>
            `;
            
            // 页码
            for (let i = 1; i <= totalPages; i++) {
                if (i === currentPage) {
                    html += `<li class="page-item active"><a class="page-link" href="#">${i}</a></li>`;
                } else {
                    html += `<li class="page-item"><a class="page-link" href="#" onclick="changePage(${i})">${i}</a></li>`;
                }
            }
            
            // 下一页
            html += `
                <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="changePage(${currentPage + 1})">下一页</a>
                </li>
            `;
            
            $('#pagination').html(html);
        }

        // 切换页码
        function changePage(page) {
            if (page < 1) return;
            currentPage = page;
            loadData();
        }

        // 搜索数据
        function searchData() {
            currentPage = 1;
            loadData();
        }

        // 加载班级列表
        function loadClassList() {
            $.get('/api/class/page', { pageSize: 1000 }, function(res) {
                if (res.code === 200) {
                    classList = res.data.list;
                    let options = '<option value="">请选择班级</option>';
                    classList.forEach(item => {
                        options += `<option value="${item.id}">${item.className}</option>`;
                    });
                    $('#classId').html(options);
                    $('#searchClassId').html('<option value="">选择班级</option>' + options.substring(23));
                }
            });
        }

        // 显示新增模态窗
        function showAddModal() {
            $('#modalTitle').text('新增学生');
            $('#studentForm')[0].reset();
            $('#studentId').val('');
            $('#addModal').modal('show');
        }

        // 显示编辑模态窗
        function showEditModal(id) {
            $('#modalTitle').text('编辑学生');
            $.get('/api/student/' + id, function(res) {
                if (res.code === 200) {
                    const data = res.data;
                    $('#studentId').val(data.id);
                    $('#studentNo').val(data.studentNo);
                    $('#studentName').val(data.studentName);
                    $('#gender').val(data.gender);
                    $('#phone').val(data.phone);
                    $('#email').val(data.email);
                    $('#classId').val(data.classId);
                    $('#enrollYear').val(data.enrollYear);
                    $('#status').val(data.status);
                    $('#addModal').modal('show');
                }
            });
        }

        // 提交表单
        function submitForm() {
            const id = $('#studentId').val();
            const data = {
                studentNo: $('#studentNo').val(),
                studentName: $('#studentName').val(),
                gender: parseInt($('#gender').val()),
                phone: $('#phone').val(),
                email: $('#email').val(),
                classId: $('#classId').val() ? parseInt($('#classId').val()) : null,
                enrollYear: $('#enrollYear').val() ? parseInt($('#enrollYear').val()) : null,
                status: parseInt($('#status').val())
            };

            const url = id ? '/api/student' : '/api/student';
            const method = id ? 'PUT' : 'POST';

            if (id) {
                data.id = parseInt(id);
            }

            $.ajax({
                url: url,
                type: method,
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: function(res) {
                    if (res.code === 200) {
                        alert(res.message);
                        $('#addModal').modal('hide');
                        loadData();
                    } else {
                        alert('操作失败: ' + res.message);
                    }
                }
            });
        }

        // 删除
        function deleteItem(id) {
            if (!confirm('确定要删除该学生吗？')) return;
            
            $.ajax({
                url: '/api/student/' + id,
                type: 'DELETE',
                success: function(res) {
                    if (res.code === 200) {
                        alert(res.message);
                        loadData();
                    } else {
                        alert('删除失败: ' + res.msg);
                    }
                }
            });
        }

        // 全选/取消全选
        function toggleSelectAll() {
            const selectAll = $('#selectAll').is(':checked');
            $('#tableBody .form-check-input').prop('checked', selectAll);
            updateSelected();
        }

        // 更新选中的ID
        function updateSelected() {
            selectedIds = [];
            $('#tableBody .form-check-input:checked').each(function() {
                selectedIds.push(parseInt($(this).val()));
            });
            document.getElementById('batchDeleteBtn').style.display = selectedIds.length > 0 ? 'inline-flex' : 'none';
        }

        // 批量删除
        function batchDelete() {
            if (selectedIds.length === 0) {
                alert('请选择要删除的学生');
                return;
            }
            if (!confirm('确定要批量删除选中的学生吗？')) return;

            $.ajax({
                url: '/api/student/batch',
                type: 'DELETE',
                contentType: 'application/json',
                data: JSON.stringify(selectedIds),
                success: function(res) {
                    if (res.code === 200) { $('#selectAll').prop('checked', false); alert(res.message); loadData(); }
                    else { alert('批量删除失败: ' + res.message); }
                }
            });
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hour = String(date.getHours()).padStart(2, '0');
            const minute = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hour}:${minute}`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学院管理 - 高校实训管理平台</title>
    <!-- Bootstrap 5.3.0 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome 6.4.0 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Icons', 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #1d1d1f;
        }

        .content-card {
            background: #ffffff;
            padding: 32px;
            min-height: 100vh;
        }

        .card-header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e5e5e7;
        }

        .card-title {
            font-size: 24px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 4px;
        }

        .card-subtitle {
            font-size: 14px;
            color: #86868b;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .toolbar-right {
            display: flex;
            gap: 8px;
        }

        .search-input, .search-select {
            border: 1px solid #d1d1d6;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .search-input {
            min-width: 200px;
        }

        .search-select {
            min-width: 120px;
        }

        .search-input:focus, .search-select:focus {
            outline: none;
            border-color: #007AFF;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        .btn-icon {
            border: 1px solid #d1d1d6;
            background: #ffffff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
            color: #007AFF;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-icon:hover {
            background-color: #f5f5f7;
            border-color: #007AFF;
        }

        .btn-icon-primary {
            background: #007AFF;
            color: #ffffff;
            border-color: #007AFF;
        }

        .btn-icon-primary:hover {
            background: #0056CC;
            border-color: #0056CC;
        }

        .btn-icon-danger {
            color: #FF3B30;
        }

        .btn-icon-danger:hover {
            background-color: #ffe5e5;
            border-color: #FF3B30;
        }

        .table {
            margin-bottom: 0;
        }

        .table th {
            font-weight: 600;
            color: #1d1d1f;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e5e5e7;
            padding: 12px 16px;
            background: #fafafa;
        }

        .table td {
            padding: 14px 16px;
            font-size: 14px;
            color: #1d1d1f;
            vertical-align: middle;
            border-bottom: 1px solid #f0f0f0;
        }

        .table tbody tr:hover {
            background-color: #f8f9fa;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-enabled {
            background-color: #e6f7ed;
            color: #00A862;
        }

        .status-disabled {
            background-color: #ffe5e5;
            color: #FF3B30;
        }

        .btn-action {
            border: none;
            background: none;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-size: 13px;
            margin-right: 4px;
        }

        .btn-edit {
            color: #007AFF;
        }

        .btn-edit:hover {
            background-color: #e8f0ff;
        }

        .btn-delete {
            color: #FF3B30;
        }

        .btn-delete:hover {
            background-color: #ffe5e5;
        }

        .pagination {
            justify-content: flex-end;
            margin-top: 20px;
        }

        .page-link {
            border: none;
            color: #007AFF;
            padding: 8px 12px;
            margin: 0 2px;
            border-radius: 6px;
            font-size: 14px;
        }

        .page-link:hover {
            background-color: #f0f0f0;
        }

        .page-item.active .page-link {
            background: #007AFF;
            color: #ffffff;
        }

        /* Modal Styles */
        .modal-content {
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px 12px 0 0;
            padding: 20px 24px;
        }

        .modal-title {
            font-weight: 600;
            font-size: 18px;
        }

        .modal-body {
            padding: 24px;
        }

        .form-label {
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 8px;
        }

        .form-control, .form-select {
            border: 1px solid #d1d1d6;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
        }

        .form-control:focus, .form-select:focus {
            border-color: #007AFF;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        .btn-modal {
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-modal-primary {
            background: #007AFF;
            color: white;
        }

        .btn-modal-primary:hover {
            background: #0056CC;
        }

        .btn-modal-secondary {
            background: #f5f5f7;
            color: #1d1d1f;
        }

        .btn-modal-secondary:hover {
            background: #e5e5e7;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #86868b;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .loading i {
            font-size: 32px;
            color: #007AFF;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="content-card">
        <div class="card-header">
            <h1 class="card-title"><i class="fas fa-university me-2"></i>学院管理</h1>
            <p class="card-subtitle">管理学院信息，包括学院名称、编码、联系方式等</p>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="toolbar-left">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索学院名称...">
                <select class="search-select" id="statusSelect">
                    <option value="">全部状态</option>
                    <option value="1">启用</option>
                    <option value="0">停用</option>
                </select>
                <button class="btn-icon" onclick="searchData()">
                    <i class="fas fa-search"></i> 查询
                </button>
                <button class="btn-icon" onclick="resetSearch()">
                    <i class="fas fa-redo"></i> 重置
                </button>
            </div>
            <div class="toolbar-right">
                <button class="btn-icon btn-icon-primary" onclick="showAddModal()">
                    <i class="fas fa-plus"></i> 新增学院
                </button>
                <button class="btn-icon btn-icon-danger" id="batchDeleteBtn" onclick="batchDelete()" style="display:none;">
                    <i class="fas fa-trash"></i> 批量删除
                </button>
            </div>
        </div>

        <!-- Table -->
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th class="checkbox-cell">
                            <input type="checkbox" class="form-check-input" id="checkAll" onchange="toggleCheckAll()">
                        </th>
                        <th>学院名称</th>
                        <th>学院编码</th>
                        <th>联系电话</th>
                        <th>联系邮箱</th>
                        <th>地址</th>
                        <th>排序</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="10" class="loading">
                            <i class="fas fa-spinner"></i>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <nav>
            <ul class="pagination" id="pagination"></ul>
        </nav>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="collegeModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增学院</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="collegeForm">
                        <input type="hidden" id="collegeId">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">学院名称 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="collegeName" required maxlength="60">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">学院编码 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="collegeCode" required maxlength="30">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">联系电话</label>
                                <input type="text" class="form-control" id="contactPhone" maxlength="20">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">联系邮箱</label>
                                <input type="email" class="form-control" id="contactEmail" maxlength="100">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">学院地址</label>
                            <input type="text" class="form-control" id="address" maxlength="255">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">学院简介</label>
                            <textarea class="form-control" id="intro" rows="3" maxlength="5000"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">排序</label>
                                <input type="number" class="form-control" id="sort" value="0" min="0">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">状态 <span class="text-danger">*</span></label>
                                <select class="form-select" id="status" required>
                                    <option value="1">启用</option>
                                    <option value="0">停用</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-modal btn-modal-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn-modal btn-modal-primary" onclick="saveCollege()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <script>
        let currentPage = 1;
        let pageSize = 10;
        let total = 0;
        let selectedIds = [];

        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
        });

        // 加载数据
        function loadData() {
            const searchKey = document.getElementById('searchInput').value;
            const status = document.getElementById('statusSelect').value;

            axios.get('/api/college/list', {
                params: {
                    pageNum: currentPage,
                    pageSize: pageSize,
                    collegeName: searchKey,
                    status: status
                }
            }).then(res => {
                if (res.data.code === 200) {
                    renderTable(res.data.data.list);
                    total = res.data.data.total;
                    renderPagination();
                } else {
                    alert(res.data.message || '加载失败');
                }
            }).catch(err => {
                console.error(err);
                alert('请求失败');
            });
        }

        // 渲染表格
        function renderTable(list) {
            const tbody = document.getElementById('tableBody');
            
            if (!list || list.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="10" class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>暂无数据</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = list.map(item => `
                <tr>
                    <td class="checkbox-cell">
                        <input type="checkbox" class="form-check-input row-checkbox" value="${item.id}" onchange="updateSelected()">
                    </td>
                    <td>${item.collegeName}</td>
                    <td>${item.collegeCode}</td>
                    <td>${item.contactPhone || '-'}</td>
                    <td>${item.contactEmail || '-'}</td>
                    <td>${item.address || '-'}</td>
                    <td>${item.sort}</td>
                    <td>
                        <span class="status-badge ${item.status === 1 ? 'status-enabled' : 'status-disabled'}">
                            ${item.status === 1 ? '启用' : '停用'}
                        </span>
                    </td>
                    <td>${formatTime(item.createTime)}</td>
                    <td>
                        <button class="btn-action btn-edit" onclick="showEditModal(${item.id})">
                            <i class="fas fa-edit"></i> 编辑
                        </button>
                        <button class="btn-action btn-delete" onclick="deleteCollege(${item.id})">
                            <i class="fas fa-trash"></i> 删除
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // 渲染分页
        function renderPagination() {
            const totalPages = Math.ceil(total / pageSize);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = `
                <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="changePage(${currentPage - 1})">上一页</a>
                </li>
            `;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `
                        <li class="page-item ${i === currentPage ? 'active' : ''}">
                            <a class="page-link" href="#" onclick="changePage(${i})">${i}</a>
                        </li>
                    `;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
                }
            }

            html += `
                <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="changePage(${currentPage + 1})">下一页</a>
                </li>
            `;

            pagination.innerHTML = html;
        }

        // 切换页码
        function changePage(page) {
            if (page < 1) return;
            currentPage = page;
            loadData();
        }

        // 搜索
        function searchData() {
            currentPage = 1;
            loadData();
        }

        // 重置搜索
        function resetSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('statusSelect').value = '';
            currentPage = 1;
            loadData();
        }

        // 显示新增模态框
        function showAddModal() {
            document.getElementById('modalTitle').textContent = '新增学院';
            document.getElementById('collegeForm').reset();
            document.getElementById('collegeId').value = '';
            new bootstrap.Modal(document.getElementById('collegeModal')).show();
        }

        // 显示编辑模态框
        function showEditModal(id) {
            axios.get(`/api/college/${id}`).then(res => {
                if (res.data.code === 200) {
                    const data = res.data.data;
                    document.getElementById('modalTitle').textContent = '编辑学院';
                    document.getElementById('collegeId').value = data.id;
                    document.getElementById('collegeName').value = data.collegeName;
                    document.getElementById('collegeCode').value = data.collegeCode;
                    document.getElementById('contactPhone').value = data.contactPhone || '';
                    document.getElementById('contactEmail').value = data.contactEmail || '';
                    document.getElementById('address').value = data.address || '';
                    document.getElementById('intro').value = data.intro || '';
                    document.getElementById('sort').value = data.sort || 0;
                    document.getElementById('status').value = data.status;
                    new bootstrap.Modal(document.getElementById('collegeModal')).show();
                }
            });
        }

        // 保存学院
        function saveCollege() {
            const id = document.getElementById('collegeId').value;
            const data = {
                collegeName: document.getElementById('collegeName').value,
                collegeCode: document.getElementById('collegeCode').value,
                contactPhone: document.getElementById('contactPhone').value,
                contactEmail: document.getElementById('contactEmail').value,
                address: document.getElementById('address').value,
                intro: document.getElementById('intro').value,
                sort: parseInt(document.getElementById('sort').value),
                status: parseInt(document.getElementById('status').value)
            };

            if (!data.collegeName || !data.collegeCode) {
                alert('请填写必填字段');
                return;
            }

            const url = id ? '/api/college' : '/api/college';
            const method = id ? 'put' : 'post';

            if (id) data.id = parseInt(id);

            axios[method](url, data).then(res => {
                if (res.data.code === 200) {
                    alert(id ? '修改成功' : '新增成功');
                    bootstrap.Modal.getInstance(document.getElementById('collegeModal')).hide();
                    loadData();
                } else {
                    alert(res.data.message || '操作失败');
                }
            });
        }

        // 删除学院
        function deleteCollege(id) {
            if (!confirm('确定要删除该学院吗？')) return;

            axios.delete(`/api/college/${id}`).then(res => {
                if (res.data.code === 200) {
                    alert('删除成功');
                    loadData();
                } else {
                    alert(res.data.message || '删除失败');
                }
            });
        }

        // 全选/取消全选
        function toggleCheckAll() {
            const checkAll = document.getElementById('checkAll');
            document.querySelectorAll('.row-checkbox').forEach(cb => {
                cb.checked = checkAll.checked;
            });
            updateSelected();
        }

        // 更新选中项
        function updateSelected() {
            selectedIds = Array.from(document.querySelectorAll('.row-checkbox:checked')).map(cb => cb.value);
            document.getElementById('batchDeleteBtn').style.display = selectedIds.length > 0 ? 'inline-flex' : 'none';
        }

        // 批量删除
        function batchDelete() {
            if (selectedIds.length === 0) return;
            if (!confirm(`确定要删除选中的 ${selectedIds.length} 个学院吗？`)) return;

            axios.delete('/api/college/batch', {
                data: selectedIds.map(id => parseInt(id))
            }).then(res => {
                if (res.data.code === 200) {
                    alert('批量删除成功');
                    document.getElementById('checkAll').checked = false;
                    loadData();
                } else {
                    alert(res.data.message || '批量删除失败');
                }
            });
        }

        // 格式化时间
        function formatTime(time) {
            if (!time) return '-';
            const date = new Date(time);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
</body>
</html>

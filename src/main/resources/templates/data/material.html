<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耗材管理 - 高校实训管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: #fff; color: #1d1d1f; }
        .content-card { background: #fff; padding: 32px; }
        .card-header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #e5e5e7; }
        .card-title { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
        .card-subtitle { font-size: 14px; color: #86868b; }
        .toolbar { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 12px; }
        .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 12px; }
        .search-input, .search-select { border: 1px solid #d1d1d6; border-radius: 8px; padding: 8px 12px; }
        .btn-icon { border: 1px solid #d1d1d6; background: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; color: #007AFF; }
        .btn-icon:hover { background: #f5f5f7; }
        .btn-icon-primary { background: #007AFF; color: #fff; border-color: #007AFF; }
        .btn-icon-danger { color: #FF3B30; }
        .table th { font-weight: 600; font-size: 13px; border-bottom: 2px solid #e5e5e7; padding: 12px 16px; background: #fafafa; }
        .table td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
        .table tbody tr:hover { background: #f8f9fa; }
        .status-badge { padding: 4px 12px; border-radius: 12px; font-size: 12px; }
        .status-1 { background: #e6f7ed; color: #00A862; }
        .status-0 { background: #ffe5e5; color: #FF3B30; }
        .btn-action { border: none; background: none; cursor: pointer; padding: 6px 10px; border-radius: 6px; }
        .btn-edit { color: #007AFF; }
        .btn-edit:hover { background: #e8f0ff; }
        .btn-delete { color: #FF3B30; }
        .btn-delete:hover { background: #ffe5e5; }
        .pagination { justify-content: flex-end; margin-top: 20px; }
        .page-link { border: none; color: #007AFF; padding: 8px 12px; margin: 0 2px; border-radius: 6px; }
        .page-item.active .page-link { background: #007AFF; color: #fff; }
        .modal-content { border: none; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        .modal-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border-radius: 12px 12px 0 0; padding: 20px 24px; }
        .modal-body { padding: 24px; }
        .form-label { font-weight: 500; margin-bottom: 8px; }
        .form-control, .form-select { border: 1px solid #d1d1d6; border-radius: 8px; padding: 10px 12px; }
        .form-control:focus, .form-select:focus { border-color: #007AFF; box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }
        .btn-modal { padding: 10px 24px; border-radius: 8px; border: none; cursor: pointer; }
        .btn-modal-primary { background: #007AFF; color: #fff; }
        .btn-modal-secondary { background: #f5f5f7; }
        .loading, .empty-state { text-align: center; padding: 40px; color: #86868b; }
        .warn { color: #FF3B30; font-weight: 600; }
    </style>
</head>
<body>
    <div class="content-card">
        <div class="card-header">
            <h1 class="card-title"><i class="fas fa-box me-2"></i>耗材管理</h1>
            <p class="card-subtitle">管理实训耗材库存，包括耗材名称、规格、单价、库存等</p>
        </div>
        <div class="toolbar">
            <div class="toolbar-left">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索耗材名称...">
                <select class="search-select" id="statusSelect">
                    <option value="">全部状态</option>
                    <option value="1">正常</option>
                    <option value="0">停用</option>
                </select>
                <button class="btn-icon" onclick="searchData()"><i class="fas fa-search"></i> 查询</button>
                <button class="btn-icon" onclick="resetSearch()"><i class="fas fa-redo"></i> 重置</button>
            </div>
            <div class="toolbar-right">
                <button class="btn-icon btn-icon-primary" onclick="showAddModal()"><i class="fas fa-plus"></i> 新增耗材</button>
                <button class="btn-icon btn-icon-danger" id="batchDeleteBtn" onclick="batchDelete()" style="display:none;"><i class="fas fa-trash"></i> 批量删除</button>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th style="width:50px;"><input type="checkbox" class="form-check-input" id="checkAll" onchange="toggleCheckAll()"></th>
                        <th>耗材名称</th>
                        <th>规格型号</th>
                        <th>单位</th>
                        <th>采购单价</th>
                        <th>库存数量</th>
                        <th>预警值</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody"><tr><td colspan="9" class="loading"><i class="fas fa-spinner"></i></td></tr></tbody>
            </table>
        </div>
        <nav><ul class="pagination" id="pagination"></ul></nav>
    </div>

    <div class="modal fade" id="materialModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增耗材</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="materialForm">
                        <input type="hidden" id="materialId">
                        <div class="mb-3">
                            <label class="form-label">耗材名称 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="materialName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">规格型号</label>
                            <input type="text" class="form-control" id="spec">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">计量单位 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="unit" placeholder="如：个、套、米" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">采购单价 <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="price" step="0.01" min="0" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">库存数量 <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="stockNum" value="0" min="0" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">库存预警值</label>
                            <input type="number" class="form-control" id="warnNum" value="10" min="0">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">状态</label>
                            <select class="form-select" id="status">
                                <option value="1">正常</option>
                                <option value="0">停用</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-modal btn-modal-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn-modal btn-modal-primary" onclick="saveMaterial()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        let currentPage = 1, pageSize = 10, total = 0, selectedIds = [];
        document.addEventListener('DOMContentLoaded', loadData);
        function loadData() {
            axios.get('/api/material/list', { params: { pageNum: currentPage, pageSize, materialName: document.getElementById('searchInput').value, status: document.getElementById('statusSelect').value } }).then(res => {
                if (res.data.code === 200) { renderTable(res.data.data.list); total = res.data.data.total; renderPagination(); }
            });
        }
        function renderTable(list) {
            const tbody = document.getElementById('tableBody');
            if (!list || list.length === 0) { tbody.innerHTML = '<tr><td colspan="9" class="empty-state"><i class="fas fa-inbox"></i><p>暂无数据</p></td></tr>'; return; }
            tbody.innerHTML = list.map(item => {
                const isWarn = item.stockNum <= item.warnNum;
                return `<tr><td><input type="checkbox" class="form-check-input row-checkbox" value="${item.id}" onchange="updateSelected()"></td><td>${item.materialName}</td><td>${item.spec||'-'}</td><td>${item.unit}</td><td>¥${item.price}</td><td class="${isWarn?'warn':''}">${item.stockNum}${isWarn?' ⚠️':''}</td><td>${item.warnNum}</td><td><span class="status-badge status-${item.status}">${item.status===1?'正常':'停用'}</span></td><td><button class="btn-action btn-edit" onclick="showEditModal(${item.id})"><i class="fas fa-edit"></i></button><button class="btn-action btn-delete" onclick="deleteMaterial(${item.id})"><i class="fas fa-trash"></i></button></td></tr>`;
            }).join('');
        }
        function renderPagination() {
            const totalPages = Math.ceil(total / pageSize);
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) { pagination.innerHTML = ''; return; }
            let html = `<li class="page-item ${currentPage===1?'disabled':''}"><a class="page-link" href="#" onclick="changePage(${currentPage-1})">上一页</a></li>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) html += `<li class="page-item ${i===currentPage?'active':''}"><a class="page-link" href="#" onclick="changePage(${i})">${i}</a></li>`;
            }
            html += `<li class="page-item ${currentPage===totalPages?'disabled':''}"><a class="page-link" href="#" onclick="changePage(${currentPage+1})">下一页</a></li>`;
            pagination.innerHTML = html;
        }
        function changePage(page) { if (page < 1) return; currentPage = page; loadData(); }
        function searchData() { currentPage = 1; loadData(); }
        function resetSearch() { document.getElementById('searchInput').value = ''; document.getElementById('statusSelect').value = ''; currentPage = 1; loadData(); }
        function showAddModal() { document.getElementById('modalTitle').textContent = '新增耗材'; document.getElementById('materialForm').reset(); document.getElementById('materialId').value = ''; new bootstrap.Modal(document.getElementById('materialModal')).show(); }
        function showEditModal(id) {
            axios.get(`/api/material/${id}`).then(res => {
                if (res.data.code === 200) {
                    const data = res.data.data;
                    document.getElementById('modalTitle').textContent = '编辑耗材';
                    document.getElementById('materialId').value = data.id;
                    document.getElementById('materialName').value = data.materialName;
                    document.getElementById('spec').value = data.spec || '';
                    document.getElementById('unit').value = data.unit;
                    document.getElementById('price').value = data.price;
                    document.getElementById('stockNum').value = data.stockNum;
                    document.getElementById('warnNum').value = data.warnNum;
                    document.getElementById('status').value = data.status;
                    new bootstrap.Modal(document.getElementById('materialModal')).show();
                }
            });
        }
        function saveMaterial() {
            const id = document.getElementById('materialId').value;
            const data = { materialName: document.getElementById('materialName').value, spec: document.getElementById('spec').value, unit: document.getElementById('unit').value, price: parseFloat(document.getElementById('price').value), stockNum: parseInt(document.getElementById('stockNum').value), warnNum: parseInt(document.getElementById('warnNum').value), status: parseInt(document.getElementById('status').value) };
            if (!data.materialName || !data.unit) { alert('请填写必填字段'); return; }
            const method = id ? 'put' : 'post';
            if (id) data.id = parseInt(id);
            axios[method]('/api/material', data).then(res => { if (res.data.code === 200) { alert(id ? '修改成功' : '新增成功'); bootstrap.Modal.getInstance(document.getElementById('materialModal')).hide(); loadData(); } else { alert(res.data.message || '操作失败'); } });
        }
        function deleteMaterial(id) { if (!confirm('确定要删除该耗材吗？')) return; axios.delete(`/api/material/${id}`).then(res => { if (res.data.code === 200) { alert('删除成功'); loadData(); } }); }
        function toggleCheckAll() { document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = document.getElementById('checkAll').checked); updateSelected(); }
        function updateSelected() { selectedIds = Array.from(document.querySelectorAll('.row-checkbox:checked')).map(cb => cb.value); document.getElementById('batchDeleteBtn').style.display = selectedIds.length > 0 ? 'inline-flex' : 'none'; }
        function batchDelete() { if (selectedIds.length === 0 || !confirm(`确定要删除选中的 ${selectedIds.length} 个耗材吗？`)) return; axios.delete('/api/material/batch', { data: selectedIds.map(id => parseInt(id)) }).then(res => { if (res.data.code === 200) { alert('批量删除成功'); document.getElementById('checkAll').checked = false; loadData(); } }); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩管理 - 高校实训管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Icons', 'Helvetica Neue', Arial, sans-serif; background-color: #ffffff; margin: 0; padding: 0; }
        .content-card { background: #ffffff; border-radius: 0; padding: 32px; box-shadow: none; min-height: 100vh; }
        .card-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #e5e5e7; }
        .card-title { font-size: 20px; font-weight: 600; color: #1d1d1f; margin: 0 0 4px 0; }
        .card-subtitle { font-size: 14px; color: #86868b; margin: 0; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 16px; flex-wrap: wrap; }
        .toolbar-left { display: flex; align-items: center; gap: 12px; flex: 1; flex-wrap: wrap; }
        .toolbar-right { display: flex; align-items: center; gap: 8px; }
        .search-input, .search-select { border: 1px solid #d1d1d6; border-radius: 8px; padding: 8px 12px; font-size: 14px; transition: all 0.2s ease; }
        .search-input { min-width: 150px; }
        .search-select { min-width: 150px; cursor: pointer; }
        .search-input:focus, .search-select:focus { outline: none; border-color: #007AFF; box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1); }
        .btn-icon { border: 1px solid #d1d1d6; background: #ffffff; padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; font-size: 14px; font-weight: 500; color: #007AFF; display: flex; align-items: center; gap: 6px; }
        .btn-icon:hover { background-color: #f5f5f7; border-color: #007AFF; }
        .btn-icon-danger { color: #FF3B30; }
        .btn-icon-danger:hover { background-color: #ffe5e5; }
        .table-responsive { overflow-x: auto; }
        .table th { font-weight: 600; color: #1d1d1f; font-size: 14px; border-bottom: 2px solid #e5e5e7; padding: 12px 16px; }
        .table td { padding: 12px 16px; font-size: 14px; color: #1d1d1f; vertical-align: middle; }
        .checkbox-cell { width: 50px; }
        .form-check-input { width: 18px; height: 18px; cursor: pointer; }
        .btn-action { border: none; background: none; cursor: pointer; padding: 6px 10px; border-radius: 6px; transition: all 0.2s ease; font-size: 13px; margin-right: 4px; }
        .btn-edit { color: #007AFF; }
        .btn-edit:hover { background-color: #e8f0ff; }
        .btn-delete { color: #FF3B30; }
        .btn-delete:hover { background-color: #ffe5e5; }
        .pagination { justify-content: flex-end; margin-top: 20px; }
        .page-link { border: none; color: #007AFF; padding: 8px 12px; margin: 0 2px; border-radius: 6px; font-size: 14px; }
        .page-link:hover { background-color: #f5f5f7; }
        .page-item.active .page-link { background-color: #007AFF; border-color: #007AFF; }
        .modal-header { border-bottom: 1px solid #e5e5e7; padding: 20px 24px; }
        .modal-title { font-size: 18px; font-weight: 600; color: #1d1d1f; }
        .modal-body { padding: 24px; }
        .form-label { font-size: 14px; font-weight: 500; color: #1d1d1f; margin-bottom: 8px; }
        .form-control, .form-select { border: 1px solid #d1d1d6; border-radius: 8px; padding: 10px 12px; font-size: 14px; transition: all 0.2s ease; }
        .form-control:focus, .form-select:focus { outline: none; border-color: #007AFF; box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1); }
        .btn-primary { background-color: #007AFF; border: none; padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: all 0.2s ease; }
        .btn-primary:hover { background-color: #0056CC; }
        .btn-secondary { background-color: #f5f5f7; border: 1px solid #d1d1d6; color: #1d1d1f; padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: all 0.2s ease; }
        .btn-secondary:hover { background-color: #e5e5e7; }
        .score-excellent { color: #00A862; font-weight: 600; }
        .score-good { color: #007AFF; font-weight: 500; }
        .score-pass { color: #FF9500; font-weight: 500; }
        .score-fail { color: #FF3B30; font-weight: 600; }
    </style>
</head>
<body>
    <div class="content-card">
        <div class="card-header">
            <h3 class="card-title">
                <i class="fas fa-chart-line" style="color: #007AFF; margin-right: 10px;"></i>
                成绩管理
            </h3>
            <p class="card-subtitle">管理学生考试成绩和学业评估</p>
        </div>

        <div class="toolbar">
            <div class="toolbar-left">
                <select class="search-select" id="searchStudentId">
                    <option value="">选择学生</option>
                </select>
                <select class="search-select" id="searchCourseId">
                    <option value="">选择课程</option>
                </select>
                <input type="text" class="search-input" id="searchSemester" placeholder="学期 (如: 2024-2025-1)">
                <select class="search-select" id="searchExamType">
                    <option value="">考试类型</option>
                    <option value="1">期中考试</option>
                    <option value="2">期末考试</option>
                </select>
                <button class="btn-icon" onclick="searchData()">
                    <i class="fas fa-search"></i> 搜索
                </button>
            </div>
            <div class="toolbar-right">
                <button class="btn-icon btn-icon-primary" onclick="showAddModal()"><i class="fas fa-plus"></i> 新增成绩</button>
                <button class="btn-icon btn-icon-danger" id="batchDeleteBtn" onclick="batchDelete()" style="display:none;"><i class="fas fa-trash"></i> 批量删除</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th class="checkbox-cell">
                            <input type="checkbox" class="form-check-input" id="selectAll" onchange="toggleSelectAll()">
                        </th>
                        <th>学生</th>
                        <th>课程</th>
                        <th>平时成绩</th>
                        <th>考试成绩</th>
                        <th>总成绩</th>
                        <th>学期</th>
                        <th>考试类型</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <nav>
            <ul class="pagination" id="pagination"></ul>
        </nav>
    </div>

    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增成绩</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="scoreForm">
                        <input type="hidden" id="scoreId">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="mb-3">
                                <label class="form-label">学生 <span style="color: #FF3B30;">*</span></label>
                                <select class="form-select" id="studentId" required>
                                    <option value="">请选择</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">课程 <span style="color: #FF3B30;">*</span></label>
                                <select class="form-select" id="courseId" required>
                                    <option value="">请选择</option>
                                </select>
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="mb-3">
                                <label class="form-label">平时成绩 <span style="color: #FF3B30;">*</span></label>
                                <input type="number" class="form-control" id="usualScore" required placeholder="0-100" min="0" max="100" step="0.1" onchange="calculateTotal()">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">考试成绩 <span style="color: #FF3B30;">*</span></label>
                                <input type="number" class="form-control" id="examScore" required placeholder="0-100" min="0" max="100" step="0.1" onchange="calculateTotal()">
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="mb-3">
                                <label class="form-label">总成绩</label>
                                <input type="number" class="form-control" id="totalScore" placeholder="自动计算 (考试60% + 平时40%)" readonly>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">学期 <span style="color: #FF3B30;">*</span></label>
                                <input type="text" class="form-control" id="semester" required placeholder="例如: 2024-2025-1">
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="mb-3">
                                <label class="form-label">考试类型 <span style="color: #FF3B30;">*</span></label>
                                <select class="form-select" id="examType" required>
                                    <option value="">请选择</option>
                                    <option value="1">期中考试</option>
                                    <option value="2">期末考试</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">备注</label>
                                <input type="text" class="form-control" id="remark" placeholder="选填">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn-primary" onclick="submitForm()">确定</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script>
        let currentPage = 1;
        let pageSize = 10;
        let selectedIds = [];
        let studentList = [];
        let courseList = [];

        $(function() {
            loadData();
            loadStudentList();
            loadCourseList();
        });

        function loadData() {
            const params = {
                pageNum: currentPage,
                pageSize: pageSize,
                studentId: $('#searchStudentId').val(),
                courseId: $('#searchCourseId').val(),
                semester: $('#searchSemester').val(),
                examType: $('#searchExamType').val()
            };
            $.get('/api/score/page', params, function(res) {
                if (res.code === 200) {
                    renderTable(res.data.list);
                    renderPagination(res.data);
                } else {
                    alert('查询失败: ' + res.message);
                }
            });
        }

        function renderTable(data) {
            let html = '';
            if (data.length === 0) {
                html = '<tr><td colspan="10" class="text-center text-muted">暂无数据</td></tr>';
            } else {
                data.forEach(item => {
                    const studentName = getStudentName(item.studentId);
                    const courseName = getCourseName(item.courseId);
                    const examTypeText = item.examType === 1 ? '期中考试' : '期末考试';
                    const totalScoreClass = item.totalScore >= 90 ? 'score-excellent' : item.totalScore >= 80 ? 'score-good' : item.totalScore >= 60 ? 'score-pass' : 'score-fail';
                    
                    html += `
                        <tr>
                            <td class="checkbox-cell"><input type="checkbox" class="form-check-input" value="${item.id}" onchange="updateSelectedIds()"></td>
                            <td>${studentName}</td>
                            <td>${courseName}</td>
                            <td>${item.usualScore || '-'}</td>
                            <td>${item.examScore || '-'}</td>
                            <td class="${totalScoreClass}">${item.totalScore || '-'}</td>
                            <td>${item.semester || '-'}</td>
                            <td>${examTypeText}</td>
                            <td>${formatDate(item.createTime)}</td>
                            <td>
                                <button class="btn-action btn-edit" onclick="showEditModal(${item.id})"><i class="fas fa-edit"></i> 编辑</button>
                                <button class="btn-action btn-delete" onclick="deleteItem(${item.id})"><i class="fas fa-trash"></i> 删除</button>
                            </td>
                        </tr>
                    `;
                });
            }
            $('#tableBody').html(html);
        }

        function renderPagination(data) {
            let html = '';
            const totalPages = Math.ceil(data.total / data.pageSize);
            html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="changePage(${currentPage - 1})">上一页</a></li>`;
            for (let i = 1; i <= totalPages; i++) {
                html += i === currentPage ? `<li class="page-item active"><a class="page-link" href="#">${i}</a></li>` : `<li class="page-item"><a class="page-link" href="#" onclick="changePage(${i})">${i}</a></li>`;
            }
            html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="changePage(${currentPage + 1})">下一页</a></li>`;
            $('#pagination').html(html);
        }

        function changePage(page) { if (page < 1) return; currentPage = page; loadData(); }
        function searchData() { currentPage = 1; loadData(); }

        function loadStudentList() {
            $.get('/api/student/page', { pageSize: 1000 }, function(res) {
                if (res.code === 200) {
                    studentList = res.data.list;
                    let options = '<option value="">请选择学生</option>';
                    studentList.forEach(item => {
                        options += `<option value="${item.id}">${item.studentNo} - ${item.studentName}</option>`;
                    });
                    $('#studentId').html(options);
                }
            });
        }

        function loadCourseList() {
            $.get('/api/course/page', { pageSize: 1000 }, function(res) {
                if (res.code === 200) {
                    courseList = res.data.list;
                    let options = '<option value="">请选择课程</option>';
                    courseList.forEach(item => {
                        options += `<option value="${item.id}">${item.courseCode} - ${item.courseName}</option>`;
                    });
                    $('#courseId').html(options);
                    $('#searchCourseId').html('<option value="">选择课程</option>' + options.substring(23));
                }
            });
        }

        function getStudentName(studentId) {
            const student = studentList.find(s => s.id === studentId);
            return student ? `${student.studentNo} - ${student.studentName}` : '-';
        }

        function getCourseName(courseId) {
            const course = courseList.find(c => c.id === courseId);
            return course ? `${course.courseCode} - ${course.courseName}` : '-';
        }

        function calculateTotal() {
            const usualScore = parseFloat($('#usualScore').val()) || 0;
            const examScore = parseFloat($('#examScore').val()) || 0;
            const totalScore = examScore * 0.6 + usualScore * 0.4;
            $('#totalScore').val(totalScore.toFixed(1));
        }

        function showAddModal() {
            $('#modalTitle').text('新增成绩');
            $('#scoreForm')[0].reset();
            $('#scoreId').val('');
            $('#addModal').modal('show');
        }

        function showEditModal(id) {
            $('#modalTitle').text('编辑成绩');
            $.get('/api/score/' + id, function(res) {
                if (res.code === 200) {
                    const data = res.data;
                    $('#scoreId').val(data.id);
                    $('#studentId').val(data.studentId);
                    $('#courseId').val(data.courseId);
                    $('#usualScore').val(data.usualScore);
                    $('#examScore').val(data.examScore);
                    $('#totalScore').val(data.totalScore);
                    $('#semester').val(data.semester);
                    $('#examType').val(data.examType);
                    $('#remark').val(data.remark);
                    $('#addModal').modal('show');
                }
            });
        }

        function submitForm() {
            const id = $('#scoreId').val();
            const data = {
                studentId: parseInt($('#studentId').val()),
                courseId: parseInt($('#courseId').val()),
                usualScore: parseFloat($('#usualScore').val()),
                examScore: parseFloat($('#examScore').val()),
                totalScore: parseFloat($('#totalScore').val()),
                semester: $('#semester').val(),
                examType: parseInt($('#examType').val()),
                remark: $('#remark').val()
            };
            const url = id ? '/api/score' : '/api/score';
            const method = id ? 'PUT' : 'POST';
            if (id) data.id = parseInt(id);

            $.ajax({
                url: url,
                type: method,
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: function(res) {
                    if (res.code === 200) {
                        alert(res.message);
                        $('#addModal').modal('hide');
                        loadData();
                    } else {
                        alert('操作失败: ' + res.message);
                    }
                }
            });
        }

        function deleteItem(id) {
            if (!confirm('确定要删除该成绩吗？')) return;
            $.ajax({
                url: '/api/score/' + id,
                type: 'DELETE',
                success: function(res) {
                    if (res.code === 200) {
                        alert(res.message);
                        loadData();
                    } else {
                        alert('删除失败: ' + res.message);
                    }
                }
            });
        }

        function toggleSelectAll() {
            const selectAll = $('#selectAll').is(':checked');
            $('#tableBody .form-check-input').prop('checked', selectAll);
            updateSelected();
        }

        function updateSelected() {
            selectedIds = [];
            $('#tableBody .form-check-input:checked').each(function() {
                selectedIds.push(parseInt($(this).val()));
            });
            document.getElementById('batchDeleteBtn').style.display = selectedIds.length > 0 ? 'inline-flex' : 'none';
        }

        function batchDelete() {
            if (selectedIds.length === 0) { alert('请选择要删除的成绩'); return; }
            if (!confirm('确定要批量删除选中的成绩吗？')) return;
            $.ajax({
                url: '/api/score/batch',
                type: 'DELETE',
                contentType: 'application/json',
                data: JSON.stringify(selectedIds),
                success: function(res) {
                    if (res.code === 200) { $('#selectAll').prop('checked', false); alert(res.message); loadData(); }
                    else { alert('批量删除失败: ' + res.message); }
                }
            });
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hour = String(date.getHours()).padStart(2, '0');
            const minute = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hour}:${minute}`;
        }
    </script>
</body>
</html>

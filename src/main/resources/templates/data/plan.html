<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实训开班管理 - 高校实训管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: #fff; color: #1d1d1f; }
        .content-card { background: #fff; padding: 32px; min-height: 100vh; }
        .card-header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #e5e5e7; }
        .card-title { font-size: 24px; font-weight: 600; color: #1d1d1f; margin-bottom: 4px; }
        .card-subtitle { font-size: 14px; color: #86868b; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 16px; flex-wrap: wrap; }
        .toolbar-left { display: flex; align-items: center; gap: 12px; flex: 1; }
        .toolbar-right { display: flex; gap: 8px; }
        .search-input, .search-select { border: 1px solid #d1d1d6; border-radius: 8px; padding: 8px 12px; font-size: 14px; }
        .search-input { min-width: 200px; }
        .search-select { min-width: 120px; }
        .search-input:focus, .search-select:focus { outline: none; border-color: #007AFF; box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }
        .btn-icon { border: 1px solid #d1d1d6; background: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; color: #007AFF; display: inline-flex; align-items: center; gap: 6px; }
        .btn-icon:hover { background: #f5f5f7; border-color: #007AFF; }
        .btn-icon-primary { background: #007AFF; color: #fff; border-color: #007AFF; }
        .btn-icon-primary:hover { background: #0056CC; }
        .btn-icon-danger { color: #FF3B30; }
        .btn-icon-danger:hover { background: #ffe5e5; border-color: #FF3B30; }
        .table th { font-weight: 600; color: #1d1d1f; font-size: 13px; text-transform: uppercase; border-bottom: 2px solid #e5e5e7; padding: 12px 16px; background: #fafafa; }
        .table td { padding: 14px 16px; font-size: 14px; color: #1d1d1f; border-bottom: 1px solid #f0f0f0; }
        .table tbody tr:hover { background: #f8f9fa; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .status-1 { background: #e3f2fd; color: #1976d2; }
        .status-2 { background: #fff3e0; color: #f57c00; }
        .status-3 { background: #e6f7ed; color: #00A862; }
        .status-4 { background: #f0f0f0; color: #666; }
        .status-5 { background: #ffe5e5; color: #FF3B30; }
        .btn-action { border: none; background: none; cursor: pointer; padding: 6px 10px; border-radius: 6px; font-size: 13px; margin-right: 4px; }
        .btn-edit { color: #007AFF; }
        .btn-edit:hover { background: #e8f0ff; }
        .btn-delete { color: #FF3B30; }
        .btn-delete:hover { background: #ffe5e5; }
        .pagination { justify-content: flex-end; margin-top: 20px; }
        .page-link { border: none; color: #007AFF; padding: 8px 12px; margin: 0 2px; border-radius: 6px; }
        .page-link:hover { background: #f0f0f0; }
        .page-item.active .page-link { background: #007AFF; color: #fff; }
        .modal-content { border: none; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        .modal-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border-radius: 12px 12px 0 0; padding: 20px 24px; }
        .modal-title { font-weight: 600; font-size: 18px; }
        .modal-body { padding: 24px; }
        .form-label { font-weight: 500; color: #1d1d1f; margin-bottom: 8px; }
        .form-control, .form-select { border: 1px solid #d1d1d6; border-radius: 8px; padding: 10px 12px; font-size: 14px; }
        .form-control:focus, .form-select:focus { border-color: #007AFF; box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }
        .btn-modal { padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; border: none; cursor: pointer; }
        .btn-modal-primary { background: #007AFF; color: #fff; }
        .btn-modal-primary:hover { background: #0056CC; }
        .btn-modal-secondary { background: #f5f5f7; color: #1d1d1f; }
        .btn-modal-secondary:hover { background: #e5e5e7; }
        .empty-state { text-align: center; padding: 60px 20px; color: #86868b; }
        .empty-state i { font-size: 64px; margin-bottom: 16px; opacity: 0.3; }
        .loading { text-align: center; padding: 40px; }
        .loading i { font-size: 32px; color: #007AFF; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="content-card">
        <div class="card-header">
            <h1 class="card-title"><i class="fas fa-calendar-alt me-2"></i>实训开班管理</h1>
            <p class="card-subtitle">管理实训开班计划，包括开班名称、学期、时间、教师等</p>
        </div>
        <div class="toolbar">
            <div class="toolbar-left">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索开班名称...">
                <select class="search-select" id="statusSelect">
                    <option value="">全部状态</option>
                    <option value="1">待报名</option>
                    <option value="2">报名中</option>
                    <option value="3">进行中</option>
                    <option value="4">已结束</option>
                    <option value="5">已取消</option>
                </select>
                <button class="btn-icon" onclick="searchData()"><i class="fas fa-search"></i> 查询</button>
                <button class="btn-icon" onclick="resetSearch()"><i class="fas fa-redo"></i> 重置</button>
            </div>
            <div class="toolbar-right">
                <button class="btn-icon btn-icon-primary" onclick="showAddModal()"><i class="fas fa-plus"></i> 新增开班</button>
                <button class="btn-icon btn-icon-danger" id="batchDeleteBtn" onclick="batchDelete()" style="display:none;"><i class="fas fa-trash"></i> 批量删除</button>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th style="width:50px;"><input type="checkbox" class="form-check-input" id="checkAll" onchange="toggleCheckAll()"></th>
                        <th>开班名称</th>
                        <th>所属项目</th>
                        <th>学年学期</th>
                        <th>开始日期</th>
                        <th>结束日期</th>
                        <th>指导教师</th>
                        <th>人数</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="10" class="loading"><i class="fas fa-spinner"></i></td></tr>
                </tbody>
            </table>
        </div>
        <nav><ul class="pagination" id="pagination"></ul></nav>
    </div>

    <div class="modal fade" id="planModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增实训开班</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="planForm">
                        <input type="hidden" id="planId">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">开班名称 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="planName" required maxlength="100">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">所属项目 <span class="text-danger">*</span></label>
                                <select class="form-select" id="projectId" required></select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">学年学期 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="termYear" placeholder="如：2025-2026上" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">实训地点</label>
                                <input type="text" class="form-control" id="trainAddress" maxlength="200">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">开始日期 <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="startDate" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">结束日期 <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="endDate" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">最大容纳人数</label>
                                <input type="number" class="form-control" id="maxStudent" value="50" min="1">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">状态 <span class="text-danger">*</span></label>
                                <select class="form-select" id="planStatus" required>
                                    <option value="1">待报名</option>
                                    <option value="2">报名中</option>
                                    <option value="3">进行中</option>
                                    <option value="4">已结束</option>
                                    <option value="5">已取消</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">备注</label>
                            <textarea class="form-control" id="remark" rows="2"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-modal btn-modal-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn-modal btn-modal-primary" onclick="savePlan()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        let currentPage = 1, pageSize = 10, total = 0, selectedIds = [];
        document.addEventListener('DOMContentLoaded', () => { loadProjects(); loadData(); });
        function loadProjects() {
            axios.get('/api/project/all').then(res => {
                if (res.data.code === 200) {
                    document.getElementById('projectId').innerHTML = res.data.data.map(p => `<option value="${p.id}">${p.projectName}</option>`).join('');
                }
            });
        }
        function loadData() {
            axios.get('/api/plan/list', { params: { pageNum: currentPage, pageSize, planName: document.getElementById('searchInput').value, planStatus: document.getElementById('statusSelect').value } }).then(res => {
                if (res.data.code === 200) { renderTable(res.data.data.list); total = res.data.data.total; renderPagination(); }
            });
        }
        function renderTable(list) {
            const tbody = document.getElementById('tableBody');
            if (!list || list.length === 0) { tbody.innerHTML = '<tr><td colspan="10" class="empty-state"><i class="fas fa-inbox"></i><p>暂无数据</p></td></tr>'; return; }
            const statusMap = {1: '待报名', 2: '报名中', 3: '进行中', 4: '已结束', 5: '已取消'};
            tbody.innerHTML = list.map(item => `<tr><td><input type="checkbox" class="form-check-input row-checkbox" value="${item.id}" onchange="updateSelected()"></td><td>${item.planName}</td><td>${item.projectName || '-'}</td><td>${item.termYear}</td><td>${item.startDate}</td><td>${item.endDate}</td><td>${item.teacherName || '-'}</td><td>${item.enrollNum||0}/${item.maxStudent}</td><td><span class="status-badge status-${item.planStatus}">${statusMap[item.planStatus]}</span></td><td><button class="btn-action btn-edit" onclick="showEditModal(${item.id})"><i class="fas fa-edit"></i> 编辑</button><button class="btn-action btn-delete" onclick="deletePlan(${item.id})"><i class="fas fa-trash"></i> 删除</button></td></tr>`).join('');
        }
        function renderPagination() {
            const totalPages = Math.ceil(total / pageSize);
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) { pagination.innerHTML = ''; return; }
            let html = `<li class="page-item ${currentPage===1?'disabled':''}"><a class="page-link" href="#" onclick="changePage(${currentPage-1})">上一页</a></li>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) html += `<li class="page-item ${i===currentPage?'active':''}"><a class="page-link" href="#" onclick="changePage(${i})">${i}</a></li>`;
                else if (i === currentPage - 3 || i === currentPage + 3) html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
            }
            html += `<li class="page-item ${currentPage===totalPages?'disabled':''}"><a class="page-link" href="#" onclick="changePage(${currentPage+1})">下一页</a></li>`;
            pagination.innerHTML = html;
        }
        function changePage(page) { if (page < 1) return; currentPage = page; loadData(); }
        function searchData() { currentPage = 1; loadData(); }
        function resetSearch() { document.getElementById('searchInput').value = ''; document.getElementById('statusSelect').value = ''; currentPage = 1; loadData(); }
        function showAddModal() { document.getElementById('modalTitle').textContent = '新增实训开班'; document.getElementById('planForm').reset(); document.getElementById('planId').value = ''; new bootstrap.Modal(document.getElementById('planModal')).show(); }
        function showEditModal(id) {
            axios.get(`/api/plan/${id}`).then(res => {
                if (res.data.code === 200) {
                    const data = res.data.data;
                    document.getElementById('modalTitle').textContent = '编辑实训开班';
                    document.getElementById('planId').value = data.id;
                    document.getElementById('planName').value = data.planName;
                    document.getElementById('projectId').value = data.projectId;
                    document.getElementById('termYear').value = data.termYear;
                    document.getElementById('trainAddress').value = data.trainAddress || '';
                    document.getElementById('startDate').value = data.startDate;
                    document.getElementById('endDate').value = data.endDate;
                    document.getElementById('maxStudent').value = data.maxStudent;
                    document.getElementById('planStatus').value = data.planStatus;
                    document.getElementById('remark').value = data.remark || '';
                    new bootstrap.Modal(document.getElementById('planModal')).show();
                }
            });
        }
        function savePlan() {
            const id = document.getElementById('planId').value;
            const data = { planName: document.getElementById('planName').value, projectId: parseInt(document.getElementById('projectId').value), termYear: document.getElementById('termYear').value, trainAddress: document.getElementById('trainAddress').value, startDate: document.getElementById('startDate').value, endDate: document.getElementById('endDate').value, maxStudent: parseInt(document.getElementById('maxStudent').value), planStatus: parseInt(document.getElementById('planStatus').value), remark: document.getElementById('remark').value };
            if (!data.planName || !data.projectId || !data.startDate || !data.endDate) { alert('请填写必填字段'); return; }
            const url = id ? '/api/plan' : '/api/plan';
            const method = id ? 'put' : 'post';
            if (id) data.id = parseInt(id);
            axios[method](url, data).then(res => { if (res.data.code === 200) { alert(id ? '修改成功' : '新增成功'); bootstrap.Modal.getInstance(document.getElementById('planModal')).hide(); loadData(); } else { alert(res.data.message || '操作失败'); } });
        }
        function deletePlan(id) { if (!confirm('确定要删除该开班吗？')) return; axios.delete(`/api/plan/${id}`).then(res => { if (res.data.code === 200) { alert('删除成功'); loadData(); } else { alert(res.data.message || '删除失败'); } }); }
        function toggleCheckAll() { const checkAll = document.getElementById('checkAll'); document.querySelectorAll('.row-checkbox').forEach(cb => { cb.checked = checkAll.checked; }); updateSelected(); }
        function updateSelected() { selectedIds = Array.from(document.querySelectorAll('.row-checkbox:checked')).map(cb => cb.value); document.getElementById('batchDeleteBtn').style.display = selectedIds.length > 0 ? 'inline-flex' : 'none'; }
        function batchDelete() { if (selectedIds.length === 0) return; if (!confirm(`确定要删除选中的 ${selectedIds.length} 个开班吗？`)) return; axios.delete('/api/plan/batch', { data: selectedIds.map(id => parseInt(id)) }).then(res => { if (res.data.code === 200) { alert('批量删除成功'); document.getElementById('checkAll').checked = false; loadData(); } else { alert(res.data.message || '批量删除失败'); } }); }
    </script>
</body>
</html>

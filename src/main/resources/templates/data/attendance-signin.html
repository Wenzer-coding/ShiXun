<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>签到 - 高校实训管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .signin-card {
            background: #fff;
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header .icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .header .icon i { font-size: 32px; color: #fff; }
        .header h1 { font-size: 22px; font-weight: 700; color: #1d1d1f; margin-bottom: 4px; }
        .header p { font-size: 14px; color: #86868b; margin: 0; }
        .info-box {
            background: #f5f5f7;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: center;
        }
        .info-box .label { font-size: 12px; color: #86868b; margin-bottom: 4px; }
        .info-box .value { font-size: 16px; font-weight: 600; color: #1d1d1f; }
        .form-group { margin-bottom: 20px; }
        .form-group label { font-weight: 500; margin-bottom: 8px; display: block; color: #1d1d1f; }
        .input-group-custom {
            display: flex;
            border: 2px solid #d1d1d6;
            border-radius: 12px;
            overflow: hidden;
            transition: border-color 0.3s;
        }
        .input-group-custom:focus-within { border-color: #667eea; }
        .input-group-custom input {
            flex: 1;
            border: none;
            padding: 14px 16px;
            font-size: 18px;
            outline: none;
            text-align: center;
            letter-spacing: 4px;
        }
        .input-group-custom .input-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            color: #86868b;
            background: #f5f5f7;
        }
        .btn-signin {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-signin:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(102,126,234,0.4); }
        .btn-signin:active { transform: translateY(0); }
        .btn-signin:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .result-box {
            margin-top: 24px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }
        .result-box.success { display: block; background: #e6f7ed; color: #00A862; }
        .result-box.error { display: block; background: #ffe5e5; color: #FF3B30; }
        .result-box i { font-size: 40px; margin-bottom: 12px; display: block; }
        .result-box .msg { font-size: 18px; font-weight: 600; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #c7c7cc; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="signin-card">
        <div class="header">
            <div class="icon"><i class="fas fa-clock"></i></div>
            <h1>实训签到</h1>
            <p>请扫描二维码进行签到</p>
        </div>

        <div class="info-box" id="infoBox">
            <div class="label">当前考勤</div>
            <div class="value" id="planInfo">加载中...</div>
            <div class="label" style="margin-top:8px;">考勤日期</div>
            <div class="value" id="dateInfo">-</div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-id-card me-1"></i> 请输入学号</label>
            <div class="input-group-custom">
                <div class="input-icon"><i class="fas fa-user-graduate"></i></div>
                <input type="text" id="studentNoInput" placeholder="请输入学号" maxlength="20" autocomplete="off">
            </div>
        </div>

        <button class="btn-signin" id="signinBtn" onclick="doSignIn()">
            <i class="fas fa-check-circle me-1"></i> 签到
        </button>

        <div class="result-box" id="resultBox">
            <i id="resultIcon" class="fas fa-check-circle"></i>
            <div class="msg" id="resultMsg"></div>
        </div>

        <div class="footer">高校实训管理平台 &copy; 2026</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const planId = params.get('planId');
        const date = params.get('date');

        if (planId && date) {
            document.getElementById('planInfo').textContent = '考勤ID: ' + planId;
            document.getElementById('dateInfo').textContent = date;
        } else {
            document.getElementById('planInfo').textContent = '参数错误，请重新扫描二维码';
        }

        document.getElementById('studentNoInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doSignIn();
        });

        function doSignIn() {
            const studentNo = document.getElementById('studentNoInput').value.trim();
            if (!studentNo) {
                showResult(false, '请输入学号');
                return;
            }
            if (!planId || !date) {
                showResult(false, '二维码参数无效，请重新扫描');
                return;
            }

            const btn = document.getElementById('signinBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 签到中...';

            axios.post('/api/attendance/signin', { studentNo, planId, date })
                .then(res => {
                    if (res.data.code === 200) {
                        showResult(true, res.data.data.message);
                        document.getElementById('studentNoInput').value = '';
                    } else {
                        showResult(false, res.data.message || '签到失败');
                    }
                })
                .catch(err => {
                    showResult(false, '网络错误，请稍后重试');
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check-circle me-1"></i> 签到';
                });
        }

        function showResult(success, msg) {
            const box = document.getElementById('resultBox');
            const icon = document.getElementById('resultIcon');
            const msgEl = document.getElementById('resultMsg');
            box.className = 'result-box ' + (success ? 'success' : 'error');
            icon.className = success ? 'fas fa-check-circle' : 'fas fa-times-circle';
            msgEl.textContent = msg;

            if (success) {
                setTimeout(() => { box.className = 'result-box'; }, 5000);
            }
        }
    </script>
</body>
</html>

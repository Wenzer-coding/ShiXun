<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耗材领用管理 - 高校实训管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: #fff; color: #1d1d1f; }
        .content-card { background: #fff; padding: 32px; }
        .card-header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #e5e5e7; }
        .card-title { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
        .card-subtitle { font-size: 14px; color: #86868b; }
        .toolbar { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 12px; }
        .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 12px; }
        .search-select { border: 1px solid #d1d1d6; border-radius: 8px; padding: 8px 12px; }
        .btn-icon { border: 1px solid #d1d1d6; background: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; color: #007AFF; }
        .btn-icon:hover { background: #f5f5f7; }
        .btn-icon-primary { background: #007AFF; color: #fff; border-color: #007AFF; }
        .btn-icon-danger { color: #FF3B30; }
        .table th { font-weight: 600; font-size: 13px; border-bottom: 2px solid #e5e5e7; padding: 12px 16px; background: #fafafa; }
        .table td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
        .table tbody tr:hover { background: #f8f9fa; }
        .btn-action { border: none; background: none; cursor: pointer; padding: 6px 10px; border-radius: 6px; }
        .btn-edit { color: #007AFF; }
        .btn-edit:hover { background: #e8f0ff; }
        .btn-delete { color: #FF3B30; }
        .btn-delete:hover { background: #ffe5e5; }
        .pagination { justify-content: flex-end; margin-top: 20px; }
        .page-link { border: none; color: #007AFF; padding: 8px 12px; margin: 0 2px; border-radius: 6px; }
        .page-item.active .page-link { background: #007AFF; color: #fff; }
        .modal-content { border: none; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        .modal-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border-radius: 12px 12px 0 0; padding: 20px 24px; }
        .modal-body { padding: 24px; }
        .form-label { font-weight: 500; margin-bottom: 8px; }
        .form-control, .form-select { border: 1px solid #d1d1d6; border-radius: 8px; padding: 10px 12px; }
        .form-control:focus, .form-select:focus { border-color: #007AFF; box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }
        .btn-modal { padding: 10px 24px; border-radius: 8px; border: none; cursor: pointer; }
        .btn-modal-primary { background: #007AFF; color: #fff; }
        .btn-modal-secondary { background: #f5f5f7; }
        .loading, .empty-state { text-align: center; padding: 40px; color: #86868b; }
    </style>
</head>
<body>
    <div class="content-card">
        <div class="card-header">
            <h1 class="card-title"><i class="fas fa-dolly me-2"></i>耗材领用管理</h1>
            <p class="card-subtitle">记录耗材领用情况，跟踪耗材使用去向</p>
        </div>
        <div class="toolbar">
            <div class="toolbar-left">
                <select class="search-select" id="planSelect"><option value="">全部开班</option></select>
                <select class="search-select" id="materialSelect"><option value="">全部耗材</option></select>
                <button class="btn-icon" onclick="searchData()"><i class="fas fa-search"></i> 查询</button>
                <button class="btn-icon" onclick="resetSearch()"><i class="fas fa-redo"></i> 重置</button>
            </div>
            <div class="toolbar-right">
                <button class="btn-icon btn-icon-primary" onclick="showAddModal()"><i class="fas fa-plus"></i> 新增领用</button>
                <button class="btn-icon btn-icon-danger" id="batchDeleteBtn" onclick="batchDelete()" style="display:none;"><i class="fas fa-trash"></i> 批量删除</button>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th style="width:50px;"><input type="checkbox" class="form-check-input" id="checkAll" onchange="toggleCheckAll()"></th>
                        <th>开班名称</th>
                        <th>耗材名称</th>
                        <th>领用数量</th>
                        <th>领用教师</th>
                        <th>领用日期</th>
                        <th>使用说明</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody"><tr><td colspan="8" class="loading"><i class="fas fa-spinner"></i></td></tr></tbody>
            </table>
        </div>
        <nav><ul class="pagination" id="pagination"></ul></nav>
    </div>

    <div class="modal fade" id="useModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增耗材领用</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="useForm">
                        <input type="hidden" id="useId">
                        <div class="mb-3">
                            <label class="form-label">实训开班 <span class="text-danger">*</span></label>
                            <select class="form-select" id="planId" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">耗材 <span class="text-danger">*</span></label>
                            <select class="form-select" id="materialId" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">领用数量 <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="useNum" value="1" min="1" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">领用日期 <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" id="useDate" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">使用说明</label>
                            <textarea class="form-control" id="useRemark" rows="2"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-modal btn-modal-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn-modal btn-modal-primary" onclick="saveUse()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        let currentPage = 1, pageSize = 10, total = 0, selectedIds = [];
        document.addEventListener('DOMContentLoaded', () => { loadPlans(); loadMaterials(); loadData(); });
        function loadPlans() {
            axios.get('/api/plan/all').then(res => {
                if (res.data.code === 200) {
                    const options = res.data.data.map(p => `<option value="${p.id}">${p.planName}</option>`).join('');
                    document.getElementById('planSelect').innerHTML = '<option value="">全部开班</option>' + options;
                    document.getElementById('planId').innerHTML = options;
                }
            });
        }
        function loadMaterials() {
            axios.get('/api/material/all').then(res => {
                if (res.data.code === 200) {
                    const options = res.data.data.map(m => `<option value="${m.id}">${m.materialName}</option>`).join('');
                    document.getElementById('materialSelect').innerHTML = '<option value="">全部耗材</option>' + options;
                    document.getElementById('materialId').innerHTML = options;
                }
            });
        }
        function loadData() {
            axios.get('/api/materialUse/list', { params: { pageNum: currentPage, pageSize, planId: document.getElementById('planSelect').value, materialId: document.getElementById('materialSelect').value } }).then(res => {
                if (res.data.code === 200) { renderTable(res.data.data.list); total = res.data.data.total; renderPagination(); }
            });
        }
        function renderTable(list) {
            const tbody = document.getElementById('tableBody');
            if (!list || list.length === 0) { tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><i class="fas fa-inbox"></i><p>暂无数据</p></td></tr>'; return; }
            tbody.innerHTML = list.map(item => `<tr><td><input type="checkbox" class="form-check-input row-checkbox" value="${item.id}" onchange="updateSelected()"></td><td>${item.planName}</td><td>${item.materialName}</td><td>${item.useNum}</td><td>${item.useUserName||'-'}</td><td>${item.useDate}</td><td>${item.useRemark||'-'}</td><td><button class="btn-action btn-edit" onclick="showEditModal(${item.id})"><i class="fas fa-edit"></i></button><button class="btn-action btn-delete" onclick="deleteUse(${item.id})"><i class="fas fa-trash"></i></button></td></tr>`).join('');
        }
        function renderPagination() {
            const totalPages = Math.ceil(total / pageSize);
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) { pagination.innerHTML = ''; return; }
            let html = `<li class="page-item ${currentPage===1?'disabled':''}"><a class="page-link" href="#" onclick="changePage(${currentPage-1})">上一页</a></li>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) html += `<li class="page-item ${i===currentPage?'active':''}"><a class="page-link" href="#" onclick="changePage(${i})">${i}</a></li>`;
            }
            html += `<li class="page-item ${currentPage===totalPages?'disabled':''}"><a class="page-link" href="#" onclick="changePage(${currentPage+1})">下一页</a></li>`;
            pagination.innerHTML = html;
        }
        function changePage(page) { if (page < 1) return; currentPage = page; loadData(); }
        function searchData() { currentPage = 1; loadData(); }
        function resetSearch() { document.getElementById('planSelect').value = ''; document.getElementById('materialSelect').value = ''; currentPage = 1; loadData(); }
        function showAddModal() { document.getElementById('modalTitle').textContent = '新增耗材领用'; document.getElementById('useForm').reset(); document.getElementById('useId').value = ''; new bootstrap.Modal(document.getElementById('useModal')).show(); }
        function showEditModal(id) {
            axios.get(`/api/materialUse/${id}`).then(res => {
                if (res.data.code === 200) {
                    const data = res.data.data;
                    document.getElementById('modalTitle').textContent = '编辑耗材领用';
                    document.getElementById('useId').value = data.id;
                    document.getElementById('planId').value = data.planId;
                    document.getElementById('materialId').value = data.materialId;
                    document.getElementById('useNum').value = data.useNum;
                    document.getElementById('useDate').value = data.useDate;
                    document.getElementById('useRemark').value = data.useRemark || '';
                    new bootstrap.Modal(document.getElementById('useModal')).show();
                }
            });
        }
        function saveUse() {
            const id = document.getElementById('useId').value;
            const data = { planId: parseInt(document.getElementById('planId').value), materialId: parseInt(document.getElementById('materialId').value), useNum: parseInt(document.getElementById('useNum').value), useDate: document.getElementById('useDate').value, useRemark: document.getElementById('useRemark').value };
            if (!data.planId || !data.materialId) { alert('请填写必填字段'); return; }
            const method = id ? 'put' : 'post';
            if (id) data.id = parseInt(id);
            axios[method]('/api/materialUse', data).then(res => { if (res.data.code === 200) { alert(id ? '修改成功' : '新增成功'); bootstrap.Modal.getInstance(document.getElementById('useModal')).hide(); loadData(); } else { alert(res.data.message || '操作失败'); } });
        }
        function deleteUse(id) { if (!confirm('确定要删除该领用记录吗？')) return; axios.delete(`/api/materialUse/${id}`).then(res => { if (res.data.code === 200) { alert('删除成功'); loadData(); } }); }
        function toggleCheckAll() { document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = document.getElementById('checkAll').checked); updateSelected(); }
        function updateSelected() { selectedIds = Array.from(document.querySelectorAll('.row-checkbox:checked')).map(cb => cb.value); document.getElementById('batchDeleteBtn').style.display = selectedIds.length > 0 ? 'inline-flex' : 'none'; }
        function batchDelete() { if (selectedIds.length === 0 || !confirm(`确定要删除选中的 ${selectedIds.length} 条领用记录吗？`)) return; axios.delete('/api/materialUse/batch', { data: selectedIds.map(id => parseInt(id)) }).then(res => { if (res.data.code === 200) { alert('批量删除成功'); document.getElementById('checkAll').checked = false; loadData(); } }); }
    </script>
</body>
</html>

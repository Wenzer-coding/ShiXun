<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实训项目管理 - 高校实训管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: #fff; color: #1d1d1f; }
        .content-card { background: #fff; padding: 32px; min-height: 100vh; }
        .card-header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #e5e5e7; }
        .card-title { font-size: 24px; font-weight: 600; color: #1d1d1f; margin-bottom: 4px; }
        .card-subtitle { font-size: 14px; color: #86868b; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 16px; flex-wrap: wrap; }
        .toolbar-left { display: flex; align-items: center; gap: 12px; flex: 1; }
        .toolbar-right { display: flex; gap: 8px; }
        .search-input, .search-select { border: 1px solid #d1d1d6; border-radius: 8px; padding: 8px 12px; font-size: 14px; }
        .search-input { min-width: 200px; }
        .search-select { min-width: 120px; }
        .search-input:focus, .search-select:focus { outline: none; border-color: #007AFF; box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }
        .btn-icon { border: 1px solid #d1d1d6; background: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; color: #007AFF; display: inline-flex; align-items: center; gap: 6px; }
        .btn-icon:hover { background: #f5f5f7; border-color: #007AFF; }
        .btn-icon-primary { background: #007AFF; color: #fff; border-color: #007AFF; }
        .btn-icon-primary:hover { background: #0056CC; }
        .btn-icon-danger { color: #FF3B30; }
        .btn-icon-danger:hover { background: #ffe5e5; border-color: #FF3B30; }
        .table th { font-weight: 600; color: #1d1d1f; font-size: 13px; text-transform: uppercase; border-bottom: 2px solid #e5e5e7; padding: 12px 16px; background: #fafafa; }
        .table td { padding: 14px 16px; font-size: 14px; color: #1d1d1f; border-bottom: 1px solid #f0f0f0; }
        .table tbody tr:hover { background: #f8f9fa; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .status-enabled { background: #e6f7ed; color: #00A862; }
        .status-disabled { background: #ffe5e5; color: #FF3B30; }
        .btn-action { border: none; background: none; cursor: pointer; padding: 6px 10px; border-radius: 6px; font-size: 13px; margin-right: 4px; }
        .btn-edit { color: #007AFF; }
        .btn-edit:hover { background: #e8f0ff; }
        .btn-delete { color: #FF3B30; }
        .btn-delete:hover { background: #ffe5e5; }
        .pagination { justify-content: flex-end; margin-top: 20px; }
        .page-link { border: none; color: #007AFF; padding: 8px 12px; margin: 0 2px; border-radius: 6px; }
        .page-link:hover { background: #f0f0f0; }
        .page-item.active .page-link { background: #007AFF; color: #fff; }
        .modal-content { border: none; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        .modal-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border-radius: 12px 12px 0 0; padding: 20px 24px; }
        .modal-title { font-weight: 600; font-size: 18px; }
        .modal-body { padding: 24px; }
        .form-label { font-weight: 500; color: #1d1d1f; margin-bottom: 8px; }
        .form-control, .form-select { border: 1px solid #d1d1d6; border-radius: 8px; padding: 10px 12px; font-size: 14px; }
        .form-control:focus, .form-select:focus { border-color: #007AFF; box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }
        .btn-modal { padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; border: none; cursor: pointer; }
        .btn-modal-primary { background: #007AFF; color: #fff; }
        .btn-modal-primary:hover { background: #0056CC; }
        .btn-modal-secondary { background: #f5f5f7; color: #1d1d1f; }
        .btn-modal-secondary:hover { background: #e5e5e7; }
        .empty-state { text-align: center; padding: 60px 20px; color: #86868b; }
        .empty-state i { font-size: 64px; margin-bottom: 16px; opacity: 0.3; }
        .loading { text-align: center; padding: 40px; }
        .loading i { font-size: 32px; color: #007AFF; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="content-card">
        <div class="card-header">
            <h1 class="card-title"><i class="fas fa-project-diagram me-2"></i>实训项目管理</h1>
            <p class="card-subtitle">管理实训项目信息，包括项目名称、类型、周期、学分等</p>
        </div>
        <div class="toolbar">
            <div class="toolbar-left">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索项目名称...">
                <select class="search-select" id="typeSelect">
                    <option value="">全部类型</option>
                    <option value="1">校内实训</option>
                    <option value="2">校外顶岗</option>
                    <option value="3">竞赛实训</option>
                    <option value="4">校企合作实训</option>
                </select>
                <select class="search-select" id="statusSelect">
                    <option value="">全部状态</option>
                    <option value="1">启用</option>
                    <option value="0">停用</option>
                </select>
                <button class="btn-icon" onclick="searchData()"><i class="fas fa-search"></i> 查询</button>
                <button class="btn-icon" onclick="resetSearch()"><i class="fas fa-redo"></i> 重置</button>
            </div>
            <div class="toolbar-right">
                <button class="btn-icon btn-icon-primary" onclick="showAddModal()"><i class="fas fa-plus"></i> 新增项目</button>
                <button class="btn-icon btn-icon-danger" id="batchDeleteBtn" onclick="batchDelete()" style="display:none;"><i class="fas fa-trash"></i> 批量删除</button>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th style="width:50px;"><input type="checkbox" class="form-check-input" id="checkAll" onchange="toggleCheckAll()"></th>
                        <th>项目名称</th>
                        <th>项目编号</th>
                        <th>项目类型</th>
                        <th>周期(天)</th>
                        <th>学分</th>
                        <th>耗材费用</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="10" class="loading"><i class="fas fa-spinner"></i></td></tr>
                </tbody>
            </table>
        </div>
        <nav><ul class="pagination" id="pagination"></ul></nav>
    </div>

    <div class="modal fade" id="projectModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增实训项目</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="projectForm">
                        <input type="hidden" id="projectId">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">项目名称 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="projectName" required maxlength="100">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">项目编号 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="projectCode" required maxlength="50">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">项目类型 <span class="text-danger">*</span></label>
                                <select class="form-select" id="projectType" required>
                                    <option value="1">校内实训</option>
                                    <option value="2">校外顶岗</option>
                                    <option value="3">竞赛实训</option>
                                    <option value="4">校企合作实训</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">实训周期(天) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="trainCycle" value="30" min="1" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">实训学分</label>
                                <input type="number" class="form-control" id="credit" step="0.5" min="0" value="2">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">人均耗材费用</label>
                                <input type="number" class="form-control" id="cost" step="0.01" min="0" value="0">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">实训内容简介</label>
                            <textarea class="form-control" id="content" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">实训培养目标</label>
                            <textarea class="form-control" id="target" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">状态 <span class="text-danger">*</span></label>
                            <select class="form-select" id="status" required>
                                <option value="1">启用</option>
                                <option value="0">停用</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-modal btn-modal-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn-modal btn-modal-primary" onclick="saveProject()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        let currentPage = 1, pageSize = 10, total = 0, selectedIds = [];
        document.addEventListener('DOMContentLoaded', loadData);
        function loadData() {
            axios.get('/api/project/list', { params: { pageNum: currentPage, pageSize, projectName: document.getElementById('searchInput').value, projectType: document.getElementById('typeSelect').value, status: document.getElementById('statusSelect').value } }).then(res => {
                if (res.data.code === 200) { renderTable(res.data.data.list); total = res.data.data.total; renderPagination(); }
            });
        }
        function renderTable(list) {
            const tbody = document.getElementById('tableBody');
            if (!list || list.length === 0) { tbody.innerHTML = '<tr><td colspan="10" class="empty-state"><i class="fas fa-inbox"></i><p>暂无数据</p></td></tr>'; return; }
            const typeMap = {1: '校内实训', 2: '校外顶岗', 3: '竞赛实训', 4: '校企合作实训'};
            tbody.innerHTML = list.map(item => `<tr><td><input type="checkbox" class="form-check-input row-checkbox" value="${item.id}" onchange="updateSelected()"></td><td>${item.projectName}</td><td>${item.projectCode}</td><td>${typeMap[item.projectType]}</td><td>${item.trainCycle}</td><td>${item.credit}</td><td>¥${item.cost}</td><td><span class="status-badge ${item.status===1?'status-enabled':'status-disabled'}">${item.status===1?'启用':'停用'}</span></td><td>${formatTime(item.createTime)}</td><td><button class="btn-action btn-edit" onclick="showEditModal(${item.id})"><i class="fas fa-edit"></i> 编辑</button><button class="btn-action btn-delete" onclick="deleteProject(${item.id})"><i class="fas fa-trash"></i> 删除</button></td></tr>`).join('');
        }
        function renderPagination() {
            const totalPages = Math.ceil(total / pageSize);
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) { pagination.innerHTML = ''; return; }
            let html = `<li class="page-item ${currentPage===1?'disabled':''}"><a class="page-link" href="#" onclick="changePage(${currentPage-1})">上一页</a></li>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<li class="page-item ${i===currentPage?'active':''}"><a class="page-link" href="#" onclick="changePage(${i})">${i}</a></li>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
                }
            }
            html += `<li class="page-item ${currentPage===totalPages?'disabled':''}"><a class="page-link" href="#" onclick="changePage(${currentPage+1})">下一页</a></li>`;
            pagination.innerHTML = html;
        }
        function changePage(page) { if (page < 1) return; currentPage = page; loadData(); }
        function searchData() { currentPage = 1; loadData(); }
        function resetSearch() { document.getElementById('searchInput').value = ''; document.getElementById('typeSelect').value = ''; document.getElementById('statusSelect').value = ''; currentPage = 1; loadData(); }
        function showAddModal() { document.getElementById('modalTitle').textContent = '新增实训项目'; document.getElementById('projectForm').reset(); document.getElementById('projectId').value = ''; new bootstrap.Modal(document.getElementById('projectModal')).show(); }
        function showEditModal(id) {
            axios.get(`/api/project/${id}`).then(res => {
                if (res.data.code === 200) {
                    const data = res.data.data;
                    document.getElementById('modalTitle').textContent = '编辑实训项目';
                    document.getElementById('projectId').value = data.id;
                    document.getElementById('projectName').value = data.projectName;
                    document.getElementById('projectCode').value = data.projectCode;
                    document.getElementById('projectType').value = data.projectType;
                    document.getElementById('trainCycle').value = data.trainCycle;
                    document.getElementById('credit').value = data.credit || 0;
                    document.getElementById('cost').value = data.cost || 0;
                    document.getElementById('content').value = data.content || '';
                    document.getElementById('target').value = data.target || '';
                    document.getElementById('status').value = data.status;
                    new bootstrap.Modal(document.getElementById('projectModal')).show();
                }
            });
        }
        function saveProject() {
            const id = document.getElementById('projectId').value;
            const data = { projectName: document.getElementById('projectName').value, projectCode: document.getElementById('projectCode').value, projectType: parseInt(document.getElementById('projectType').value), trainCycle: parseInt(document.getElementById('trainCycle').value), credit: parseFloat(document.getElementById('credit').value), cost: parseFloat(document.getElementById('cost').value), content: document.getElementById('content').value, target: document.getElementById('target').value, status: parseInt(document.getElementById('status').value) };
            if (!data.projectName || !data.projectCode) { alert('请填写必填字段'); return; }
            const url = id ? '/api/project' : '/api/project';
            const method = id ? 'put' : 'post';
            if (id) data.id = parseInt(id);
            axios[method](url, data).then(res => { if (res.data.code === 200) { alert(id ? '修改成功' : '新增成功'); bootstrap.Modal.getInstance(document.getElementById('projectModal')).hide(); loadData(); } else { alert(res.data.message || '操作失败'); } });
        }
        function deleteProject(id) { if (!confirm('确定要删除该项目吗？')) return; axios.delete(`/api/project/${id}`).then(res => { if (res.data.code === 200) { alert('删除成功'); loadData(); } else { alert(res.data.message || '删除失败'); } }); }
        function toggleCheckAll() { const checkAll = document.getElementById('checkAll'); document.querySelectorAll('.row-checkbox').forEach(cb => { cb.checked = checkAll.checked; }); updateSelected(); }
        function updateSelected() { selectedIds = Array.from(document.querySelectorAll('.row-checkbox:checked')).map(cb => cb.value); document.getElementById('batchDeleteBtn').style.display = selectedIds.length > 0 ? 'inline-flex' : 'none'; }
        function batchDelete() { if (selectedIds.length === 0) return; if (!confirm(`确定要删除选中的 ${selectedIds.length} 个项目吗？`)) return; axios.delete('/api/project/batch', { data: selectedIds.map(id => parseInt(id)) }).then(res => { if (res.data.code === 200) { alert('批量删除成功'); document.getElementById('checkAll').checked = false; loadData(); } else { alert(res.data.message || '批量删除失败'); } }); }
        function formatTime(time) { if (!time) return '-'; const date = new Date(time); return date.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }); }
    </script>
</body>
</html>

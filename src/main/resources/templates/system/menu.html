<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜单权限管理 - 高校实训管理平台</title>
    <!-- Bootstrap 5.3.0 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome 6.4.0 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Icons', 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
        }

        .content-card {
            background: #ffffff;
            border-radius: 0;
            padding: 32px;
            box-shadow: none;
            min-height: 100vh;
        }

        .card-header {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e5e5e7;
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: #1d1d1f;
            margin: 0 0 4px 0;
        }

        .card-subtitle {
            font-size: 14px;
            color: #86868b;
            margin: 0;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 16px;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-input {
            border: 1px solid #d1d1d6;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            transition: all 0.2s ease;
            min-width: 200px;
        }

        .search-input:focus {
            outline: none;
            border-color: #007AFF;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        .btn-icon {
            border: 1px solid #d1d1d6;
            background: #ffffff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
            color: #007AFF;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-icon:hover {
            background-color: #f5f5f7;
            border-color: #007AFF;
        }

        .btn-icon-primary {
            color: #007AFF;
        }

        .btn-icon-primary:hover {
            background-color: #e8f0ff;
            border-color: #007AFF;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            background: #f5f5f7;
            border: none;
            font-weight: 600;
            color: #1d1d1f;
            padding: 12px 16px;
        }

        .table tbody td {
            padding: 12px 16px;
            vertical-align: middle;
            border-bottom: 1px solid #e5e5e7;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
        }

        .badge-menu {
            background-color: #E3F2FD;
            color: #1976D2;
        }

        .badge-button {
            background-color: #FFF3E0;
            color: #F57C00;
        }

        .badge-api {
            background-color: #F3E5F5;
            color: #7B1FA2;
        }

        .badge-status {
            background-color: #e8f5e9;
            color: #34C759;
        }

        .badge-disabled {
            background-color: #ffebee;
            color: #FF3B30;
        }

        .action-btn {
            border: none;
            background: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .action-btn:hover {
            background-color: #f5f5f7;
        }

        .btn-edit {
            color: #007AFF;
        }

        .btn-delete {
            color: #FF3B30;
        }

        .icon-preview {
            width: 32px;
            height: 32px;
            background: #f5f5f7;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #007AFF;
            margin-right: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #86868b;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .modal-header {
            border-bottom: 1px solid #e5e5e7;
        }

        .modal-footer {
            border-top: 1px solid #e5e5e7;
        }

        .form-label {
            font-weight: 500;
            color: #1d1d1f;
        }

        .form-control:focus, .form-select:focus {
            border-color: #007AFF;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        .tree-indent {
            padding-left: 24px;
        }

        .tree-toggle i {
            transition: transform 0.2s ease;
        }

        .tree-toggle.expanded i {
            transform: rotate(90deg);
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <!-- 内容卡片 -->
        <div class="content-card">
            <!-- 卡片头部 -->
            <div class="card-header">
                <h2 class="card-title"><i class="fas fa-key me-2" style="color: #007AFF;"></i>菜单权限管理</h2>
                <p class="card-subtitle">管理系统菜单和按钮权限</p>
            </div>

            <!-- 工具栏 -->
            <div class="toolbar">
                <div class="toolbar-left">
                    <input type="text" class="search-input" id="searchInput" placeholder="搜索权限名称..." onkeyup="handleSearch(event)">
                    <button class="btn-icon" onclick="searchPermission()">
                        <i class="fas fa-search"></i>
                        <span>查询</span>
                    </button>
                </div>
                <div class="toolbar-right">
                    <button class="btn-icon btn-icon-primary" onclick="loadPermissions()">
                        <i class="fas fa-sync-alt"></i>
                        <span>刷新</span>
                    </button>
                    <button class="btn-icon btn-icon-primary" onclick="showAddModal()">
                        <i class="fas fa-plus"></i>
                        <span>新增权限</span>
                    </button>
                </div>
            </div>

            <!-- 权限列表表格 -->
            <table class="table">
                <thead>
                    <tr>
                        <th style="width: 250px;">权限名称</th>
                        <th style="width: 180px;">权限标识</th>
                        <th style="width: 100px;">类型</th>
                        <th style="width: 200px;">路径</th>
                        <th style="width: 120px;">图标</th>
                        <th style="width: 80px;">排序</th>
                        <th style="width: 80px;">状态</th>
                        <th style="width: 150px;">操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- 数据将通过JavaScript动态加载 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 新增/编辑权限模态框 -->
    <div class="modal fade" id="permissionModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增权限</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="permissionForm">
                        <input type="hidden" id="permId">
                        
                        <!-- 两列网格布局 -->
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="mb-3">
                                <label class="form-label">权限名称 <span style="color: #FF3B30;">*</span></label>
                                <input type="text" class="form-control" id="permName" required placeholder="例如: 用户管理">
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">权限标识 <span style="color: #FF3B30;">*</span></label>
                                <input type="text" class="form-control" id="permKey" placeholder="例如: sys:user:add" required>
                            </div>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="mb-3">
                                <label class="form-label">父级权限</label>
                                <!-- 树形选择器 -->
                                <div style="position: relative;">
                                    <div id="parentTreeSelect" 
                                         style="border: 1px solid #d1d1d6; border-radius: 8px; padding: 8px 12px; 
                                                background: #ffffff; cursor: pointer; min-height: 38px;
                                                display: flex; align-items: center;"
                                         onclick="toggleParentTree()">
                                        <span id="parentTreeText" style="color: #86868b;">请选择父级权限</span>
                                        <i class="fas fa-chevron-down" style="margin-left: auto; color: #86868b; font-size: 12px;"></i>
                                    </div>
                                    <input type="hidden" id="parentId" value="0">
                                    
                                    <!-- 下拉树面板 -->
                                    <div id="parentTreeDropdown" 
                                         style="display: none; position: absolute; top: 100%; left: 0; right: 0; 
                                                margin-top: 4px; background: #ffffff; border: 1px solid #d1d1d6; 
                                                border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); 
                                                max-height: 300px; overflow-y: auto; z-index: 1000; padding: 8px 0;">
                                        <!-- 树形选项将通过JavaScript动态生成 -->
                                    </div>
                                </div>
                                <small style="color: #86868b; font-size: 12px; margin-top: 4px; display: block;">
                                    <i class="fas fa-info-circle"></i> 留空表示顶级权限
                                </small>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">权限类型 <span style="color: #FF3B30;">*</span></label>
                                <select class="form-select" id="permType" required>
                                    <option value="1">菜单</option>
                                    <option value="2">按钮</option>
                                    <option value="3">接口</option>
                                </select>
                            </div>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="mb-3">
                                <label class="form-label">路径</label>
                                <input type="text" class="form-control" id="path" placeholder="例如: /system/user">
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">图标</label>
                                <div class="input-group">
                                    <input type="text" class="form-control" id="icon" placeholder="例如: fas fa-user" readonly>
                                    <button class="btn-icon btn-icon-primary" type="button" onclick="showIconPicker()" style="border-radius: 0 8px 8px 0; padding: 8px 12px;">
                                        <i class="fas fa-icons"></i>
                                        <span>选择</span>
                                    </button>
                                </div>
                                <div id="iconPreview" style="margin-top: 8px; display: none;">
                                    <div class="icon-preview" style="width: 32px; height: 32px;">
                                        <i id="iconPreviewI" class="" style="font-size: 16px;"></i>
                                    </div>
                                    <small style="color: #86868b; margin-left: 8px;" id="iconPreviewText"></small>
                                </div>
                            </div>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="mb-3">
                                <label class="form-label">排序</label>
                                <input type="number" class="form-control" id="sort" value="0" placeholder="数字越小越靠前">
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">状态</label>
                                <select class="form-select" id="status">
                                    <option value="1">启用</option>
                                    <option value="0">禁用</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-icon" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn-icon btn-icon-primary" onclick="savePermission()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 图标选择器模态框 -->
    <div class="modal fade" id="iconPickerModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-icons me-2" style="color: #007AFF;"></i>选择图标</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <!-- 搜索框 -->
                    <div class="mb-3">
                        <input type="text" class="form-control" id="iconSearchInput" placeholder="搜索图标名称..." oninput="filterIcons()">
                    </div>
                    
                    <!-- 图标分类标签 -->
                    <div class="mb-3">
                        <div class="btn-group" role="group">
                            <button type="button" class="btn-icon btn-icon-primary icon-category-btn active" onclick="selectCategory('all', this)">全部</button>
                            <button type="button" class="btn-icon icon-category-btn" onclick="selectCategory('common', this)">常用</button>
                            <button type="button" class="btn-icon icon-category-btn" onclick="selectCategory('user', this)">用户</button>
                            <button type="button" class="btn-icon icon-category-btn" onclick="selectCategory('system', this)">系统</button>
                            <button type="button" class="btn-icon icon-category-btn" onclick="selectCategory('file', this)">文件</button>
                        </div>
                    </div>
                    
                    <!-- 图标网格 -->
                    <div id="iconGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 12px; max-height: 400px; overflow-y: auto; padding: 8px;">
                        <!-- 图标将通过JavaScript动态生成 -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-icon" data-bs-dismiss="modal">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        let permissions = [];
        let modal = null;
        let iconPickerModal = null;
        let currentCategory = 'all';
        let userPermissions = []; // 当前用户的权限标识列表
        
        // FontAwesome图标库
        const iconLibrary = {
            common: [
                'fas fa-home', 'fas fa-search', 'fas fa-bell', 'fas fa-cog', 'fas fa-star',
                'fas fa-heart', 'fas fa-check', 'fas fa-times', 'fas fa-plus', 'fas fa-minus',
                'fas fa-edit', 'fas fa-trash', 'fas fa-save', 'fas fa-download', 'fas fa-upload',
                'fas fa-print', 'fas fa-envelope', 'fas fa-phone', 'fas fa-calendar', 'fas fa-clock',
                'fas fa-user', 'fas fa-users', 'fas fa-key', 'fas fa-lock', 'fas fa-unlock',
                'fas fa-eye', 'fas fa-eye-slash', 'fas fa-camera', 'fas fa-image', 'fas fa-video',
                'fas fa-music', 'fas fa-map', 'fas fa-location', 'fas fa-link', 'fas fa-flag'
            ],
            user: [
                'fas fa-user', 'fas fa-user-plus', 'fas fa-user-edit', 'fas fa-user-check',
                'fas fa-user-shield', 'fas fa-user-cog', 'fas fa-users', 'fas fa-users-cog',
                'fas fa-user-tie', 'fas fa-user-graduate', 'fas fa-user-nurse', 'fas fa-user-astronaut',
                'fas fa-address-card', 'fas fa-id-card', 'fas fa-address-book', 'fas fa-venus',
                'fas fa-mars', 'fas fa-child', 'fas fa-baby', 'fas fa-people-arrows', 'fas fa-fingerprint'
            ],
            system: [
                'fas fa-cog', 'fas fa-cogs', 'fas fa-wrench', 'fas fa-tools', 'fas fa-database',
                'fas fa-server', 'fas fa-desktop', 'fas fa-laptop', 'fas fa-mobile-alt', 'fas fa-tablet-alt',
                'fas fa-network-wired', 'fas fa-wifi', 'fas fa-signal', 'fas fa-cloud', 'fas fa-shield-alt',
                'fas fa-lock', 'fas fa-unlock', 'fas fa-key', 'fas fa-power-off', 'fas fa-sync-alt',
                'fas fa-exclamation-triangle', 'fas fa-info-circle', 'fas fa-question-circle', 'fas fa-check-circle',
                'fas fa-times-circle', 'fas fa-bell', 'fas fa-bug', 'fas fa-code', 'fas fa-terminal'
            ],
            file: [
                'fas fa-file', 'fas fa-file-alt', 'fas fa-file-pdf', 'fas fa-file-word', 'fas fa-file-excel',
                'fas fa-file-powerpoint', 'fas fa-file-image', 'fas fa-file-video', 'fas fa-file-audio',
                'fas fa-file-archive', 'fas fa-file-code', 'fas fa-folder', 'fas fa-folder-open',
                'fas fa-copy', 'fas fa-paste', 'fas fa-clipboard', 'fas fa-paperclip', 'fas fa-book',
                'fas fa-bookmark', 'fas fa-newspaper', 'fas fa-sticky-note', 'fas fa-file-upload',
                'fas fa-file-download', 'fas fa-file-export', 'fas fa-file-import', 'fas fa-file-signature'
            ]
        };
        
        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', function() {
            modal = new bootstrap.Modal(document.getElementById('permissionModal'));
            iconPickerModal = new bootstrap.Modal(document.getElementById('iconPickerModal'));
            loadUserPermissions(); // 先加载用户权限
        });

        // 加载当前用户的权限
        function loadUserPermissions() {
            axios.get('/api/auth/userinfo')
                .then(response => {
                    if (response.data.code === 200) {
                        userPermissions = response.data.data.permissions || [];
                        console.log('=== 当前用户权限列表 ===', userPermissions);
                        console.log('=== 是否有 sys:perm:add ===', userPermissions.includes('sys:perm:add'));
                        console.log('=== 是否有 sys:perm:edit ===', userPermissions.includes('sys:perm:edit'));
                        console.log('=== 是否有 sys:perm:remove ===', userPermissions.includes('sys:perm:remove'));
                        
                        // 控制工具栏按钮显示
                        updateToolbarButtons();
                        
                        // 加载完权限后再加载数据
                        loadPermissions();
                        renderIconGrid();
                    }
                })
                .catch(error => {
                    console.error('加载用户权限失败:', error);
                    userPermissions = [];
                    updateToolbarButtons();
                    loadPermissions();
                    renderIconGrid();
                });
        }

        // 检查是否有某个权限
        function hasPermission(permKey) {
            // 超级管理员判断：必须同时满足两个条件
            const isSuperAdmin = userPermissions.includes('system:manage') && 
                                 userPermissions.includes('sys:user:add') &&
                                 userPermissions.includes('sys:user:edit') &&
                                 userPermissions.includes('sys:user:remove');
            
            console.log(`=== 权限检查: ${permKey} ===`);
            console.log('  - 是否为超级管理员:', isSuperAdmin);
            console.log('  - 是否有该权限:', userPermissions.includes(permKey));
            console.log('  - 检查结果:', isSuperAdmin || userPermissions.includes(permKey));
            
            if (isSuperAdmin) {
                return true;
            }
            
            return userPermissions.includes(permKey);
        }

        // 更新工具栏按钮显示状态
        function updateToolbarButtons() {
            const toolbarRight = document.querySelector('.toolbar-right');
            if (!toolbarRight) return;
            
            const buttons = toolbarRight.querySelectorAll('.btn-icon-primary');
            buttons.forEach(btn => {
                const text = btn.textContent.trim();
                
                // 新增权限按钮（需要 sys:perm:add 权限）
                if (text.includes('新增')) {
                    if (hasPermission('sys:perm:add')) {
                        btn.style.display = 'flex';
                    } else {
                        btn.style.display = 'none';
                    }
                }
            });
        }
        
        // 渲染图标网格
        function renderIconGrid(icons = null) {
            const grid = document.getElementById('iconGrid');
            let iconList = [];
            
            if (icons) {
                iconList = icons;
            } else if (currentCategory === 'all') {
                // 显示所有图标
                Object.values(iconLibrary).forEach(arr => {
                    iconList = iconList.concat(arr);
                });
                // 去重
                iconList = [...new Set(iconList)];
            } else {
                iconList = iconLibrary[currentCategory] || [];
            }
            
            grid.innerHTML = iconList.map(icon => {
                const iconClass = icon.split(' ')[1]; // 例如: fa-user
                const iconTitle = iconClass.replace('fa-', '').replace(/-/g, ' ');
                return `
                    <div class="icon-item" onclick="selectIcon('${icon}')" 
                         style="display: flex; flex-direction: column; align-items: center; justify-content: center; 
                                padding: 12px 8px; border: 2px solid #e5e5e7; border-radius: 8px; cursor: pointer; 
                                transition: all 0.2s ease; background: #ffffff;"
                         onmouseover="this.style.borderColor='#007AFF'; this.style.background='#f0f4ff';"
                         onmouseout="this.style.borderColor='#e5e5e7'; this.style.background='#ffffff';">
                        <i class="${icon}" style="font-size: 24px; color: #007AFF; margin-bottom: 6px;"></i>
                        <span style="font-size: 10px; color: #86868b; text-align: center; overflow: hidden; 
                                     text-overflow: ellipsis; white-space: nowrap; max-width: 100%;">${iconTitle}</span>
                    </div>
                `;
            }).join('');
        }
        
        // 显示图标选择器
        function showIconPicker() {
            renderIconGrid();
            document.getElementById('iconSearchInput').value = '';
            // 重置分类按钮
            document.querySelectorAll('.icon-category-btn').forEach(btn => {
                btn.classList.remove('btn-icon-primary');
            });
            document.querySelector('.icon-category-btn').classList.add('btn-icon-primary');
            currentCategory = 'all';
            iconPickerModal.show();
        }
        
        // 过滤图标
        function filterIcons() {
            const keyword = document.getElementById('iconSearchInput').value.toLowerCase();
            if (!keyword) {
                renderIconGrid();
                return;
            }
            
            let allIcons = [];
            Object.values(iconLibrary).forEach(arr => {
                allIcons = allIcons.concat(arr);
            });
            allIcons = [...new Set(allIcons)];
            
            const filtered = allIcons.filter(icon => {
                const iconClass = icon.split(' ')[1];
                const iconTitle = iconClass.replace('fa-', '').replace(/-/g, ' ');
                return iconTitle.includes(keyword) || icon.includes(keyword);
            });
            
            renderIconGrid(filtered);
        }
        
        // 选择分类
        function selectCategory(category, btn) {
            currentCategory = category;
            // 更新按钮样式
            document.querySelectorAll('.icon-category-btn').forEach(b => {
                b.classList.remove('btn-icon-primary');
            });
            btn.classList.add('btn-icon-primary');
            renderIconGrid();
        }
        
        // 选择图标
        function selectIcon(icon) {
            document.getElementById('icon').value = icon;
            
            // 显示预览
            const preview = document.getElementById('iconPreview');
            const previewI = document.getElementById('iconPreviewI');
            const previewText = document.getElementById('iconPreviewText');
            
            previewI.className = icon;
            previewText.textContent = icon;
            preview.style.display = 'block';
            
            // 关闭选择器
            iconPickerModal.hide();
        }
        
        // 加载权限列表
        function loadPermissions() {
            axios.get('/api/permission/list')
                .then(response => {
                    if (response.data.code === 200) {
                        permissions = response.data.data || [];
                        renderTable();
                        loadParentOptions();
                    } else {
                        alert('加载失败: ' + response.data.msg);
                    }
                })
                .catch(error => {
                    console.error('加载权限列表失败:', error);
                    alert('加载失败，请检查网络连接');
                });
        }
        
        // 渲染表格（树形结构）
        function renderTable(data = permissions) {
            const tbody = document.getElementById('tableBody');
            
            if (!data || data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8">
                            <div class="empty-state">
                                <i class="fas fa-inbox"></i>
                                <p>暂无权限数据</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }
            
            // 构建树形结构
            const tree = buildMenuTree(data);
            console.log('构建的菜单树:', tree);
            
            // 递归渲染树节点
            let html = '';
            tree.forEach(node => {
                html += renderTreeNode(node, 0);
            });
            
            tbody.innerHTML = html;
        }

        // 切换菜单折叠状态
        function toggleMenu(nodeId) {
            // 阻止事件冒泡
            event.stopPropagation();
            
            const toggle = event.currentTarget;
            if (!toggle) return;
            
            const isExpanded = toggle.classList.contains('expanded');
            
            // 切换按钮状态
            toggle.classList.toggle('expanded');
            
            // 查找并切换所有子行
            toggleChildren(nodeId, isExpanded);
        }

        // 递归切换子菜单显示状态
        function toggleChildren(parentId, hide) {
            const tbody = document.getElementById('tableBody');
            const rows = tbody.querySelectorAll('tr[data-parent-id]');
            
            rows.forEach(row => {
                const rowParentId = parseInt(row.dataset.parentId);
                
                if (rowParentId === parentId) {
                    const childNodeId = row.dataset.nodeId;
                    
                    if (hide) {
                        // 隐藏子节点
                        row.style.display = 'none';
                        // 递归隐藏子节点的子节点
                        if (childNodeId) {
                            toggleChildren(parseInt(childNodeId), true);
                        }
                    } else {
                        // 显示子节点
                        row.style.display = '';
                        // 如果子节点本身是折叠状态，保持其子节点隐藏
                        const childToggle = row.querySelector('.tree-toggle');
                        if (childToggle && !childToggle.classList.contains('expanded')) {
                            // 子节点是折叠的，继续隐藏其子节点
                            if (childNodeId) {
                                toggleChildren(parseInt(childNodeId), true);
                            }
                        }
                    }
                }
            });
        }

        // 递归构建菜单树
        function buildMenuTree(data) {
            const result = [];
            const map = {};
            
            // 创建映射
            data.forEach(p => {
                map[p.id] = { ...p, children: [] };
            });
            
            // 构建树
            data.forEach(p => {
                if (p.parentId === 0) {
                    // 根节点
                    result.push(map[p.id]);
                } else {
                    // 子节点
                    if (map[p.parentId]) {
                        map[p.parentId].children.push(map[p.id]);
                    }
                }
            });
            
            return result;
        }

        // 递归渲染树节点
        function renderTreeNode(node, level) {
            const indent = level * 24; // 每层缩进24px
            const isMenu = node.permType === 1;
            const hasChildren = node.children && node.children.length > 0;
            
            let html = `
                <tr data-node-id="${node.id}" ${node.parentId ? `data-parent-id="${node.parentId}"` : ''}>
                    <td>
                        <div style="display: flex; align-items: center; padding-left: ${indent}px;">
                            ${hasChildren ? `
                                <span class="tree-toggle expanded" onclick="toggleMenu(${node.id})" 
                                      style="cursor: pointer; display: inline-flex; align-items: center; justify-content: center; 
                                             width: 20px; height: 20px; margin-right: 8px; border-radius: 4px; 
                                             transition: all 0.2s ease; color: #86868b;"
                                      onmouseover="this.style.backgroundColor='#f5f5f7'; this.style.color='#007AFF';"
                                      onmouseout="this.style.backgroundColor=''; this.style.color='#86868b';">
                                    <i class="fas fa-chevron-right" style="font-size: 12px; transition: transform 0.2s ease;"></i>
                                </span>
                            ` : '<span style="display: inline-block; width: 28px;"></span>'}
                            ${node.icon ? `<i class="${node.icon}" style="margin-right: 8px; color: #007AFF;"></i>` : ''}
                            <strong style="${isMenu ? 'font-weight: 600;' : 'font-weight: 400; color: #86868b;'}">
                                ${node.permName}
                            </strong>
                        </div>
                    </td>
                    <td>
                        <code style="background: #f5f5f7; padding: 4px 8px; border-radius: 4px; font-size: 12px;">
                            ${node.permKey || '-'}
                        </code>
                    </td>
                    <td>
                        <span class="badge ${getTypeBadge(node.permType)}">
                            ${getTypeText(node.permType)}
                        </span>
                    </td>
                    <td>${node.path || '-'}</td>
                    <td>
                        ${node.icon && level === 0 ? `
                            <div class="icon-preview">
                                <i class="${node.icon}"></i>
                            </div>
                        ` : '-'}
                    </td>
                    <td>${node.sort || 0}</td>
                    <td>
                        <span class="badge ${node.status === 1 ? 'badge-status' : 'badge-disabled'}">
                            ${node.status === 1 ? '启用' : '禁用'}
                        </span>
                    </td>
                    <td>
                        ${renderActionButtons(node)}
                    </td>
                </tr>
            `;
            
            // 递归渲染子节点
            if (node.children && node.children.length > 0) {
                node.children.forEach(child => {
                    html += renderTreeNode(child, level + 1);
                });
            }
            
            return html;
        }
        
        // 加载父级权限选项（树形结构）
        function loadParentOptions() {
            const dropdown = document.getElementById('parentTreeDropdown');
            dropdown.innerHTML = '';
            
            // 添加"顶级权限"选项
            const rootDiv = document.createElement('div');
            rootDiv.style.cssText = 'padding: 8px 16px; cursor: pointer; display: flex; align-items: center; transition: background 0.2s;';
            rootDiv.onmouseover = function() { this.style.background = '#f5f5f7'; };
            rootDiv.onmouseout = function() { this.style.background = '#ffffff'; };
            rootDiv.onclick = function() { selectParent(0, '顶级权限'); };
            rootDiv.innerHTML = `
                <i class="fas fa-globe" style="margin-right: 8px; color: #007AFF;"></i>
                <strong style="color: #1d1d1f;">顶级权限</strong>
            `;
            dropdown.appendChild(rootDiv);
            
            // 添加分隔线
            const divider = document.createElement('div');
            divider.style.cssText = 'height: 1px; background: #e5e5e7; margin: 4px 0;';
            dropdown.appendChild(divider);
            
            // 构建树形结构
            const menuPerms = permissions.filter(p => p.permType === 1);
            const tree = buildMenuTree(menuPerms);
            
            // 递归添加选项
            function addTreeOptions(nodes, level) {
                nodes.forEach(node => {
                    const div = document.createElement('div');
                    const indent = level * 24;
                    const isSelected = document.getElementById('parentId').value == node.id;
                    
                    div.style.cssText = `
                        padding: 8px 16px 8px ${16 + indent}px; 
                        cursor: pointer; 
                        display: flex; 
                        align-items: center; 
                        transition: background 0.2s;
                        background: ${isSelected ? '#e8f0ff' : '#ffffff'};
                    `;
                    div.onmouseover = function() { this.style.background = '#f5f5f7'; };
                    div.onmouseout = function() { 
                        this.style.background = isSelected ? '#e8f0ff' : '#ffffff'; 
                    };
                    div.onclick = function() { selectParent(node.id, node.permName); };
                    
                    div.innerHTML = `
                        ${level > 0 ? '<i class="fas fa-corner-down-right" style="margin-right: 8px; color: #86868b; font-size: 11px;"></i>' : ''}
                        ${node.icon ? `<i class="${node.icon}" style="margin-right: 8px; color: #007AFF;"></i>` : ''}
                        <span style="${isSelected ? 'color: #007AFF; font-weight: 600;' : 'color: #1d1d1f;'}">
                            ${node.permName}
                        </span>
                        ${isSelected ? '<i class="fas fa-check" style="margin-left: auto; color: #007AFF;"></i>' : ''}
                    `;
                    
                    dropdown.appendChild(div);
                    
                    // 递归处理子节点
                    if (node.children && node.children.length > 0) {
                        addTreeOptions(node.children, level + 1);
                    }
                });
            }
            
            addTreeOptions(tree, 0);
        }

        // 切换下拉树显示/隐藏
        function toggleParentTree() {
            const dropdown = document.getElementById('parentTreeDropdown');
            const isHidden = dropdown.style.display === 'none';
            
            if (isHidden) {
                dropdown.style.display = 'block';
            } else {
                dropdown.style.display = 'none';
            }
        }

        // 选择父级权限
        function selectParent(id, name) {
            document.getElementById('parentId').value = id;
            
            const textElement = document.getElementById('parentTreeText');
            if (id === 0) {
                textElement.textContent = '顶级权限';
                textElement.style.color = '#86868b';
            } else {
                textElement.textContent = name;
                textElement.style.color = '#1d1d1f';
            }
            
            // 关闭下拉树
            document.getElementById('parentTreeDropdown').style.display = 'none';
            
            // 重新加载父级选项以更新选中状态
            loadParentOptions();
        }

        // 点击外部关闭下拉树
        document.addEventListener('click', function(e) {
            const dropdown = document.getElementById('parentTreeDropdown');
            const selectBox = document.getElementById('parentTreeSelect');
            
            if (dropdown && selectBox) {
                if (!dropdown.contains(e.target) && !selectBox.contains(e.target)) {
                    dropdown.style.display = 'none';
                }
            }
        });
        
        // 渲染操作按钮（根据权限控制）
        function renderActionButtons(node) {
            let buttons = '';
            
            // 编辑按钮（需要 sys:perm:edit 权限）
            if (hasPermission('sys:perm:edit')) {
                buttons += `
                    <button class="action-btn btn-edit" onclick="editPermission(${node.id})">
                        <i class="fas fa-edit"></i> 编辑
                    </button>
                `;
            }
            
            // 删除按钮（需要 sys:perm:remove 权限）
            if (hasPermission('sys:perm:remove')) {
                buttons += `
                    <button class="action-btn btn-delete" onclick="deletePermission(${node.id})">
                        <i class="fas fa-trash"></i> 删除
                    </button>
                `;
            }
            
            return buttons || '<span style="color: #86868b;">-</span>';
        }

        // 获取类型文本
        function getTypeText(type) {
            const typeMap = {
                1: '菜单',
                2: '按钮',
                3: '接口'
            };
            return typeMap[type] || '未知';
        }
        
        // 获取类型样式
        function getTypeBadge(type) {
            const badgeMap = {
                1: 'badge-menu',
                2: 'badge-button',
                3: 'badge-api'
            };
            return badgeMap[type] || '';
        }
        
        // 搜索处理
        function handleSearch(event) {
            if (event.key === 'Enter') {
                searchPermission();
            }
        }
        
        // 搜索权限
        function searchPermission() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!keyword) {
                renderTable();
                return;
            }
            
            const filtered = permissions.filter(p => 
                p.permName.toLowerCase().includes(keyword) ||
                (p.permKey && p.permKey.toLowerCase().includes(keyword))
            );
            renderTable(filtered);
        }
        
        // 显示新增模态框
        function showAddModal() {
            document.getElementById('modalTitle').textContent = '新增权限';
            document.getElementById('permissionForm').reset();
            document.getElementById('permId').value = '';
            document.getElementById('parentId').value = '0';
            document.getElementById('parentTreeText').textContent = '顶级权限';
            document.getElementById('parentTreeText').style.color = '#86868b';
            document.getElementById('parentTreeDropdown').style.display = 'none';
            loadParentOptions();
            modal.show();
        }
        
        // 编辑权限
        function editPermission(id) {
            const perm = permissions.find(p => p.id === id);
            if (!perm) return;
            
            document.getElementById('modalTitle').textContent = '编辑权限';
            document.getElementById('permId').value = perm.id;
            document.getElementById('permName').value = perm.permName;
            document.getElementById('permKey').value = perm.permKey || '';
            document.getElementById('permType').value = perm.permType.toString();
            document.getElementById('path').value = perm.path || '';
            document.getElementById('icon').value = perm.icon || '';
            document.getElementById('sort').value = perm.sort || 0;
            document.getElementById('status').value = perm.status.toString();
            
            // 设置父级权限
            document.getElementById('parentId').value = perm.parentId || 0;
            if (perm.parentId === 0) {
                document.getElementById('parentTreeText').textContent = '顶级权限';
                document.getElementById('parentTreeText').style.color = '#86868b';
            } else {
                const parent = permissions.find(p => p.id === perm.parentId);
                if (parent) {
                    document.getElementById('parentTreeText').textContent = parent.permName;
                    document.getElementById('parentTreeText').style.color = '#1d1d1f';
                }
            }
            document.getElementById('parentTreeDropdown').style.display = 'none';
            
            // 显示图标预览
            if (perm.icon) {
                const preview = document.getElementById('iconPreview');
                const previewI = document.getElementById('iconPreviewI');
                const previewText = document.getElementById('iconPreviewText');
                previewI.className = perm.icon;
                previewText.textContent = perm.icon;
                preview.style.display = 'block';
            } else {
                document.getElementById('iconPreview').style.display = 'none';
            }
            
            loadParentOptions();
            modal.show();
        }
        
        // 保存权限
        function savePermission() {
            const permId = document.getElementById('permId').value;
            const data = {
                permName: document.getElementById('permName').value.trim(),
                permKey: document.getElementById('permKey').value.trim(),
                parentId: parseInt(document.getElementById('parentId').value),
                permType: parseInt(document.getElementById('permType').value),
                path: document.getElementById('path').value.trim(),
                icon: document.getElementById('icon').value.trim(),
                sort: parseInt(document.getElementById('sort').value) || 0,
                status: parseInt(document.getElementById('status').value)
            };
            
            // 验证必填字段
            if (!data.permName) {
                alert('请输入权限名称');
                return;
            }
            if (!data.permKey) {
                alert('请输入权限标识');
                return;
            }
            
            // 根据是新增还是编辑调用不同接口
            const request = permId 
                ? axios.put('/api/permission', { ...data, id: parseInt(permId) })
                : axios.post('/api/permission', data);
            
            request.then(response => {
                if (response.data.code === 200) {
                    alert(permId ? '更新成功' : '新增成功');
                    modal.hide();
                    loadPermissions();
                } else {
                    alert((permId ? '更新' : '新增') + '失败: ' + response.data.msg);
                }
            }).catch(error => {
                console.error('保存失败:', error);
                alert('保存失败');
            });
        }
        
        // 删除权限
        function deletePermission(id) {
            if (confirm('确定要删除这个权限吗？删除后无法恢复！')) {
                axios.delete(`/api/permission/${id}`)
                    .then(response => {
                        if (response.data.code === 200) {
                            alert('删除成功');
                            loadPermissions();
                        } else {
                            alert('删除失败: ' + response.data.msg);
                        }
                    })
                    .catch(error => {
                        console.error('删除失败:', error);
                        alert('删除失败');
                    });
            }
        }
    </script>
</body>
</html>
